body:
  text: 卷下治暑主方六和湯治心脾不調氣不升降霍亂轉筋嘔吐泄瀉寒熱交作痰喘咳嗽胸膈痞滿頭目昏痛肢體浮腫嗜臥倦怠小便赤澀並傷寒陰陽不分冒暑伏熱煩悶或成痢痢中酒煩渴畏食婦人胎中亦可服縮砂仁研半夏湯泡七次杏仁去皮尖各一兩人參去蘆甘草炙各一兩赤茯苓去皮藿香葉去土白扁豆薑汁略炒木瓜各二兩香薷厚朴薑汁製各四兩上㕮咀每服一兩水二盅生薑三片棗一枚煎至一盅溫服此清火調中和解之劑治暑要藥也香薷飲治伏暑引飲口燥咽乾或吐或瀉並皆治之一方加黃連四兩用薑汁同炒令老黃色名黃連香薷飲如有搐搦加羌活煎服香薷去土一斤白扁豆微炒半斤厚朴去皮薑汁炙熟半斤上㕮咀每服三錢水一盅入酒少許煎七分沉冷不拘時服熱則作瀉香薷須陳者佳十味香薷飲消暑氣和脾胃香薷一兩人參去蘆陳皮去白白朮土炒黃耆去蘆白扁豆炒去殼甘草炙乾木瓜白茯苓去皮夏朴去皮薑汁炒黑色各五錢上為末每服二錢熱湯冷水任調下以上辛散驅暑之劑蓋香薷氣厚能散暑木瓜善勝暑厚朴寬中故為要藥五苓散治中暑煩渴身熱頭痛霍亂吐瀉小便赤少如心神恍惚加辰砂又名辰砂五苓散白朮二錢白茯苓去皮二錢豬苓去粗一錢五分肉桂一錢澤瀉去毛一錢五分上㕮咀作一帖水一盅半煎八分溫服或作散用亦可桂苓甘露飲治伏暑引飲過度肚腹膨脹霍亂白茯苓去皮白朮土炒豬苓去皮滑石研各二兩寒水石研甘草炙澤瀉各一兩肉桂去皮五錢上為末拌勻每服二錢熱湯冷水任下入蜜少許更妙益元散治中暑身熱小便不利此藥性涼除胃脘積熱又淡滲濕故利大便而散濕熱也又名天水散六一散加硃砂良滑石白膩者去黃垢水飛六兩甘草去皮一兩上為末每服二錢新汲水調服以上清利消暑之劑但孕婦禁用藿香正氣散治人感四時不正之氣頭痛憎寒作熱上喘嗽咳反胃嘔吐噁心瀉泄霍亂臟腑虛鳴山嵐瘴氣大腹皮黑豆水洗七次白茯苓去皮各一兩廣陳皮去白三兩半夏湯泡洗七次二兩白芷一兩白朮土炒厚朴薑製炒桔梗甘草炙紫蘇各二兩藿香三兩上㕮咀每服一兩水二盅薑三片紅棗一枚煎一盅溫服二香散治暑濕相搏霍亂轉筋煩渴悶亂藿香二兩半夏薑製廣陳皮桔梗白朮土炒厚朴薑汁炒白茯苓紫蘇白芷各一兩甘草二兩五錢黃連去須二兩香薷一斤扁豆炒八兩大腹皮黑豆水捶洗七次一兩上㕮咀每服一兩水二盅生薑三片蔥白二根煎一盅食後溫服九味羌活湯治發熱惡寒無汗或自汗頭痛項強或傷風見寒脈傷寒見風脈並宜服之此藥不犯三陽禁忌為四時發散之通劑也溫證如神暑亦可解羌活防風蒼朮各一錢五分甘草川芎白芷生地黃芩細辛各一錢細辛用五分亦或可上㕮咀作一服水二盅生薑一片煎至一盅溫服人參敗毒散治傷寒頭痛壯熱惡寒及風痰咳嗽鼻塞聲重如心經蘊熱口舌乾燥者加黃芩溫暑通用皆臻神妙柴胡去苗甘草炙桔梗人參去蘆羌活去苗川芎白茯苓去皮枳殼去穰麩炒前胡去苗洗獨活去蘆各等分上㕮咀每服三錢水一盅薑三片薄荷少許同煎七分去滓溫服以上正氣驅邪之劑但暑不可汗微發解之敗毒散尤為調和之宗也香朴飲治伏熱吐瀉虛煩霍亂人參去蘆八分茯苓一錢甘草炙三分紫蘇葉七分木瓜七分澤瀉五分或七分香薷一錢白扁豆炒七分法半夏湯泡七次五分廣陳皮七分厚朴七分烏梅肉七分上㕮咀水二盅生薑三片棗一枚煎一盅食前熱服一發一斂一驅一補巧力並中長技也當與六和湯並善枇杷葉散治中暑伏熱煩渴引飲嘔噦噁心頭目昏眩枇杷葉去毛炙二兩香薷七錢五分白茅根麥門冬去心甘草炙乾木瓜各一兩廣陳皮去白厚朴去皮薑汁炒丁香各五錢上為末每服二錢水一盅薑三片煎服如止渴燥去丁香加知母冷水調下以上辛散之劑縮脾飲消暑氣除煩渴止吐瀉霍亂縮砂仁研四兩乾葛二兩白扁豆炒香去皮二兩烏梅肉草果炒去殼甘草炙各四兩上㕮咀每服四錢水二大碗煎七分以水沉冷服消導解利之劑黃連解毒湯治實火燥亂煩渴蓄熱內甚等證此所謂實火宜瀉黃連去毛黃芩黃柏梔子各一錢上咀片水煎服人參白虎湯治伏暑發渴嘔吐身熱脈虛自汗人參一錢五分知母二錢石膏五錢甘草炙一錢上㕮咀入粳米一合水二盅煎一盅不拘時熱服如伏暑作寒熱未解宜和五苓散同煎服伏熱後或冷水沐浴或吃冷物冷氣在脾下不散令日晡作寒慘壯熱渾身灑淅宜加桂煎服便解白虎加蒼朮湯治中暑無汗脈虛弱腹滿身重口燥面垢譫語發黃石膏二錢知母去粗蒼朮米泔水浸曬羌活各一錢甘草五分上作一劑水二盅糯米一撮煎八分不拘時服竹葉石膏湯治伏暑內外發熱煩躁大渴石膏研一兩六錢法半夏二錢五分人參二錢甘草炙二錢麥門冬去心五錢五分淡豆豉二錢糯米一合上㕮咀每服五錢水一盅入青竹葉生薑各五片煎服三黃石膏湯治陽毒發斑身黃如塗朱眼珠如火狂叫欲走六脈洪大燥渴欲死鼻乾面赤齒黃黃連黃柏黃芩各一錢石膏一兩五錢山梔三十個香豉二合上水二盅薑三片棗二枚捶法入細茶一撮煎之熱服桂苓甘露飲合敗毒散消暑更捷以上諸方皆大寒味鎮墜消毒之劑驅暑之將軍也中用人參者攝氣保中防驟損耳此等藥必重病而後用輕則惟前十方內酌用為妙百合湯病已愈而觸犯者用之最效柴胡去蘆一錢人參去蘆五分黃芩一錢甘草五分知母去粗八分百合一錢二分陳皮去白一錢生地黃七分渴加天花粉胸中煩熱加山梔有微頭疼加羌活川芎嘔吐入薑汁炒半夏胸中飽悶加枳殼桔梗食復者加枳實黃連甚重大便實者加大黃胸中虛煩加竹茹竹葉瘥後乾嘔錯語失神呻吟睡不安者加黃連犀角咳喘者加杏仁心中驚惕為血少加當歸茯神遠志虛汗加黃耆脾虛加白朮腹如雷鳴加煨生薑勞復時熱不除加葶藶烏梅生薑汁上㕮咀水二盅薑三片捶法醋煮鱉甲煎之溫服丸散方類加味胃苓丸蒼朮五兩陳皮三兩厚朴二兩甘草炙二兩白朮四兩雲茯苓二兩肉桂二兩豬苓二兩澤瀉去粗二兩人參去蘆一兩黃連去毛薑炒二兩白芍炒二兩上為末蜜丸清米湯下每服五六十丸黃龍丸治伏暑發熱煩渴嘔吐噁心黃連去毛極淨者二斤上以好醋五升煮乾為末麵糊丸梧子大熱湯下每服三十丸消暑丸治伏暑引飲脾胃不和半夏一斤生甘草雲茯苓去皮各半斤上為末薑汁煮糊為丸如梧桐子大每服五十丸熱湯下此藥味平備一斑耳玉露散治暑渴寒水石滑石去黃垢土石膏火煅栝蔞根各二兩甘草一兩上為細末每服五錢新水調下卻暑散治冒暑伏熱頭目眩暈嘔吐泄痢煩渴背寒面垢赤茯苓生甘草各四兩寒食麵生薑各一斤上為末每服二錢白湯調下備用方類大順散治冒暑伏熱引飲過多脾胃受濕水穀不分霍亂嘔吐臟腑不調甘草三斤乾薑杏仁去皮尖炒肉桂去皮各六兩四錢上先將甘草用白砂蜜炒及八分黃熟次入乾薑同炒卻入杏仁候杏仁不作聲為度用篩篩淨後入肉桂一處搗羅為末每服三錢水一盅煎五七分溫服如煩躁井花水調下不拘時候以沸湯點服亦可此劫劑也從治火攻用暑厥等劇證則效效後仍用辛涼劑調理切不可常用龍鬚散一名甘草散治中暑迷悶不省人事及泄瀉霍亂煩渴一服即愈能解暑毒白礬生一兩五倍子生三錢烏梅捶去仁二兩甘草炙一兩五錢一方生用飛羅面一兩一方用清明日面尤佳上為末入飛羅面拌勻每服二錢新水調下一方加訶子肉滴水為丸如彈子大細嚼水下名龍涎丸此豁痰劫劑輕證不可用加味桂苓甘露飲即桂苓甘露飲外加人參香薷甘草煎服治法同前補中益氣湯治暑傷元氣脈虛身弱者用之黃耆炙一錢五分人參甘草炙各五分當歸七分白朮土炒八分柴胡三分升麻三分廣陳皮留白一錢渴加葛根五分咳加麥門冬一錢五味子十五粒一方有白芍藥五分秋冬不用黃柏三分以滋腎水瀉伏火加紅龍三分入心養血上作一服水煎午前稍熱服溫補但助火反昏沉須加連膏方效調中湯大黃去皮七錢葛根黃芩藁本白朮芍藥桔梗雲茯苓去皮甘草炙各五錢上㕮咀每服五錢水盞半煎八分移時再服得利即止此下藥也須有生冷麵食積聚者方可用霖按治暑首以六和湯香薷飲此兩方乃暑月外感風寒內傷生冷之劑未可概治也五苓散為傷寒中風有表裡證渴欲飲水所以用桂術蒸膀胱之津液上騰宣陽氣布水精乃治濕之方九味羌活湯人參敗毒散辛溫升散暑濕忌汗用者皆宜慎其大順散治暑月內傷飲冷證非治暑也移治暑厥燥火之病恐貽人夭殃即使脈伏肢冷汗多舌潤亦當以參附回陽斷不可專恃薑桂燥烈之品況熱厥亡陽辨之不真雖參附亦殺人事也可不慎諸增訂數方附列於後白虎加人參湯見前增補諸方一物瓜蒂湯金匱瓜蒂二十個上銼以水一升煮去五合去滓頓服尤在涇曰暑之中人也陰虛而多火者暑即寓於火之中為汗出而煩渴陽虛而多濕者暑即伏於濕之內為身熱而疼重故暑病恆以濕為病而治濕即所以治暑瓜蒂苦寒能吐能下去身面四肢水氣水去而暑無所依將不治而自解矣此治中暑兼濕者之法也紫金錠一名玉樞丹治一切藥毒菰子鼠莽惡菌疫死牛馬河豚等毒及時行瘟疫山嵐瘴瘧纏喉風痹黃疸赤眼瘡癤熱毒上攻或自縊溺水打撲傷損癰疽發背魚臍瘡腫百蟲蛇犬所傷男子婦人癲邪狂走鬼胎鬼氣並宜服之山慈姑去皮洗焙二兩川文蛤一名五倍子捶破洗刮內桴二兩麝香細研盡三錢紅芽大戟洗焙一兩千金子去殼用紙包裹換紙研數十次去盡油無油成霜二兩上各研細末和勻以糯米粥為劑每料分作四十粒於端午七夕重陽合如欲急用辰日亦得於木臼中杵數百下不得令婦人孝服人不具手足人及雞犬之類見之竹葉石膏湯見前黃連香薷飲即前香薷飲加黃連白虎加蒼朮湯見前麥門冬湯金匱麥門冬七升半夏一升人參甘草各二兩粳米三合大棗十二枚上六味以水一斗二升煮去六升溫服升日三夜服霖按此方治胃中津液乾枯虛火上炎之良法海藏去半夏加竹葉治房勞復氣欲絶者佳生脈散治熱傷元氣氣短倦怠口乾出汗人參麥門冬五味子上三味用水煎服柯韻伯曰肺為嬌臟而朝百脈主一身元氣者也形寒飲冷則傷肺故傷寒有脈結代與脈微欲絶之危暑熱刑金則傷肺故傷熱有脈來虛散之足慮然傷寒是從外來者為實邪故雖脈不至而可復可通傷熱是從所不勝來者為賊邪非先從滋化其源挽回於未絶之前則一絶而不可復此孫真人為之急培元氣而以生脈名方也麥門冬甘寒清權衡治節之司人參甘溫補後天營衛之本五味酸溫收先天天癸之原三氣通而三才立水升火降而合既濟之理矣仲景治傷寒有通脈復脈二法少陰病裡寒外熱下利清穀脈微欲絶者制通脈四逆湯溫補以扶陽厥陰病外寒內熱心動悸脈結代者制復脈湯涼補以滋陰同是傷寒同是脈病而寒熱異治者一挽坎陽之外亡一清相火之內熾也生脈散本復脈立法外無寒故不用薑桂之辛散熱傷無形之氣未傷有形之血故不用地黃阿膠麻仁大棗且不令其泥膈而滯脈道也心主脈而苦緩急食酸以收之故去甘草而加五味矣脈資始於腎資生於胃而會於肺仲景二方重任甘草者全賴中焦穀氣以通之復之非有待於生也此欲得下焦天癸之元氣以生之故不藉甘草之緩必取資於五味之酸矣白頭翁湯傷寒論白頭翁二兩黃連黃柏秦皮各三兩上四味以水七升煮取二升去滓溫服一升不愈更服一升霖按此治厥陰熱利方也何以移治暑厥夫白頭翁臨風偏靜長於驅風用為君者以風動則火生風平則火熄欲平走竅之火必寧搖動之風也秦皮黃柏瀉少陽相火而手少陽與手厥陰表裡故佐以黃連以瀉心包絡火熱風平火熄則痙止厥回矣此釜下抽薪法也升麻鱉甲湯金匱升麻當歸甘草各二兩雄黃半兩研蜀椒炒去汗一兩鱉甲手掌大一片炙上六味以水四升煮取一升頓服之老小再服取汗肘後千金方陽毒用升麻湯無鱉甲有桂陰毒用甘草湯無雄黃趙以德曰按古方書謂陽毒者陽氣獨盛陰氣暴衰內外皆陽故成陽毒謂陰毒者陰氣獨盛陽氣暴衰內外皆陰故成陰毒二者或傷寒初得便為是證或服藥後變而成之陽毒盡治以寒涼陰毒盡治以溫熱藥劑如冰炭之異何乃仲景用一方治之乎雖曰陰毒去雄黃蜀椒則是反去其溫熱者矣且注曰肘後千金方陽毒用升麻湯無鱉甲有桂陰毒用甘草湯無雄黃豈非皆是熱毒之傷於陰陽二經絡耶在陽經絡則面赤斑斑如錦文吐膿血在陰經絡則面青身如被杖此皆陰陽水火動靜之本象如此豈是寒熱之邪乎嘗以升麻鱉甲之藥考之本草謂升麻能解時氣毒厲諸毒攻咽喉痛與熱毒成膿開壅閉療發斑當歸能破惡血養新血補五臟肌膚甘草和中利血脈緩急止痛調藥奏功鱉甲去惡血雄黃破骨節積聚闢鬼邪惡氣骨蒸熱極蜀椒通血脈調關節逐肌骨皮膚死肌去留結破血治天行時氣諸藥所能者如此即此觀之仲景於陰陽二毒之證總用一方蓋可見矣病形雖由陰陽發證論邪則一屬熱毒與血病也所以不分表裡俱以升麻解熱毒為君當歸和血為臣余者佐之而已但雄黃蜀椒理陽氣藥也故病在陰者去之如肘後千金陽毒去鱉甲有桂枝者鱉水族乃陰中之陽不如桂枝能調陽絡之血陰毒不去蜀椒者蜀椒亦陰中之陽非若雄黃陽中之陽故留之以治陰也方旨如此而已達原飲溫疫論檳榔二錢厚朴一錢草果仁五分知母一錢芍藥一錢黃芩一錢甘草五分上用水二盅煎八分午後溫服吳又可曰檳榔能消能磨除伏邪為疏利之藥又除嶺南瘴氣厚朴破戾氣所結草果辛烈氣雄除伏邪蟠踞三味協力直達其巢穴使邪氣潰散速離募原是以名為達原飲也熱傷津液加知母以滋陰熱傷營血加芍藥以和血黃芩清燥熱之餘甘草為和中之用以後四味乃調和之品如渴與水非拔病之藥也凡疫邪遊溢諸經當隨經引用以助升泄如脅痛耳聾寒熱嘔而口苦此邪熱溢於少陽經也本方加柴胡一錢如腰背項痛此邪熱溢於太陽經也本方加羌活一錢如目痛眉稜骨痛眼眶痛鼻乾不眠此邪熱溢於陽明經也本方加葛根一錢但證有遲速輕重不等藥有多寡緩急之分務在臨時斟酌所定分兩大略而已不可執滯三消飲溫疫論檳榔草果厚朴芍藥甘草知母黃芩大黃葛根羌活柴胡生薑大棗為引鄭素圃曰按三陽加法不必全用各隨其所見之經而加用之大承氣湯溫疫論大黃五錢厚朴一錢枳實一錢芒硝三錢水薑煎服弱人減半邪微者各復減半小承氣湯溫疫論大黃五錢厚朴一錢枳實一錢水薑煎服調胃承氣湯溫疫論大黃五錢芒硝二錢五分甘草一錢水薑煎服吳又可曰三承氣湯功用倣佛熱邪傳裡但上焦痞滿者宜小承氣湯中有堅結者加芒硝軟堅而潤燥病久失下雖有結糞然多黏膩得芒硝則大黃有蕩滌之能設無痞滿惟存宿結而有瘀熱者調胃承氣湯宜之三承氣功效皆在大黃余皆治標之品不耐湯藥者或嘔或噦當為細末蜜丸湯下如人方肉食而病適來以致停積在胃用大小承氣連下惟是臭水稀糞而已於承氣湯中但加人參一味服之雖三四十日所停之完穀及完肉於是方下蓋承氣借人參之力鼓舞胃氣宿物始動也升降散白殭蠶酒炒二錢全蟬蛻去土一錢廣薑黃去皮三分不用片薑黃川大黃生四錢上為細末合研勻病輕者分四次服每服重一錢八分二釐五毫用冷黃酒一杯蜂蜜五錢調勻冷服中病即止病重者分三次服每服重二錢四分三釐三毫黃酒一半蜜七錢五分調勻冷服最重者分二次服每服重三錢六分五釐黃酒二杯蜜一兩調勻冷服如一二帖未愈可再服之熱退即止胎産亦不忌煉蜜丸名太極丸性稍緩服必空心服後須忌半日不可吃茶水吃煙吃飲食若不能忌並不效能遵禁忌下咽即蘇半日而愈若飽食後服此亦不效愈後最忌飽食只宜吃稀粥四五分飽永不再發至於腥葷更須著實牢忌萬不可吃凡患瘟疫未曾服他藥或一二日或七八日或至月餘未愈但服此藥即愈若先用他藥不效後用此藥亦間有不驗者服藥雜故也楊栗山曰處方必有君臣佐使而又兼引導此良工之大法也是方以殭蠶為君蟬蛻為臣薑黃為佐大黃為使米酒為引連蜜為導六法俱備而方乃成竊嘗考諸本草而知殭蠶味辛苦氣薄喜燥惡濕得天地清化之氣輕浮而升陽中之陽故能勝風除濕清熱解鬱從治膀胱相火引輕清氣上潮於口散熱濁結滯之痰也其性屬火兼土與木老得金水之化僵而不腐溫病火炎土燥焚木爍金得秋分之金氣而自衰故能闢一切怫鬱之邪氣夫蠶必三眠三起眠者病也合薄皆病而皆不食也起者愈也合薄皆愈而皆能食也用此而治閣家之瘟病所謂因其氣相感而以意使之者也故為君夫蟬氣寒無毒味鹹且甘為清虛之品出糞土之中處極高之上自甘風露而已吸風得清陽之真氣所以能祛風而勝濕飲露得太陰之精華所以能滌熱而解毒也蛻者退也蓋欲使人退去其病亦如蟬之脫然無恙也亦所謂因其氣相感而以意使之者也故為臣薑黃味辛苦溫無毒蠻人生啖喜其祛邪伐惡行氣散郁能入心脾二經建功癖疫故為佐大黃味苦大寒無毒上下通行蓋亢甚之陽非此莫抑苦能瀉火苦能補虛一舉而兩得之人但知其建良將之大勳而不知有良相之碩德也故為使米酒性大熱味辛苦而甘令飲冷酒欲其行遲傳化以漸上行頭面下達足膝外周毛孔內通臟腑經絡驅逐邪氣無處不到如物在高巔必奮飛沖舉以取之物在遠方及深奧之處更必迅奔探索以取之且喜其和血養氣伐邪辟惡仍是華陀舊法亦屠蘇之義也故為引蜂蜜甘平無毒其性大涼主治丹毒斑疹腹內留熱嘔吐便祕欲清其熱潤燥而自散瘟毒也故為導蓋蠶食而不飲有大便無小便蟬飲而不食有小便無大便以清虛而散火君明臣良治化出焉薑黃辟邪而靖疫大黃定亂以致治佐使同心功績建焉酒引之使上行蜜潤之使下導引導協力遠近通焉補瀉兼行無偏勝之弊寒熱並用得時中之宜所謂天有覆物之功人有代覆之能其洵然哉用治溫病百發百中屢試屢驗萬無一失清瘟敗毒飲生石膏大劑六兩至八兩中劑二兩至四兩小劑八錢至一兩二錢梔子小生地大劑六錢至一兩中劑三錢至五錢小劑二錢至四錢五分桔梗烏犀角大劑六錢至八錢中劑三錢至四錢小劑二錢至四錢黃芩真川連大劑四錢至六錢中劑二錢至四錢小劑一錢至一錢半知母赤芍元參連翹甘草丹皮鮮竹葉先煮石膏數十沸後下諸藥犀角磨汁和服余師愚曰此十二經泄火之藥也凡一切火熱表裡俱感狂躁煩心口乾咽痛大熱乾嘔錯語不眠吐血衄血熱甚發斑不論始終以此為主方蓋斑疹雖出於胃亦諸經之火有以助之重用石膏直入胃經使其敷布於十二經退其淫熱佐以黃連犀角黃芩泄心肺火於上焦丹皮及梔子赤芍泄肝經之火連翹元參解散浮遊之火生地知母抑陽扶陰泄其亢甚之火而救欲絶之水桔梗竹葉載藥上行使以甘草和胃此大寒解毒之劑重用石膏則甚者先平而諸經之火自無不安矣證疫若初起惡寒發熱頭痛如劈煩躁譫妄身熱肢冷舌刺唇焦上嘔下泄六脈沉細而數即用大劑沉而數者即用中劑浮大而數者用小劑如斑一出即加大青葉並少佐升麻四五分引毒外透此內化外解濁降清升之法治一得一治十得十以視升提發表而加劇者何為俯取芻蕘之一得乎聖散子方草豆蔻麵裹炮十個木豬苓去皮石菖蒲高良薑獨活去蘆頭附子炮製去皮臍麻黃去根藁本去穰土炒厚朴去皮薑汁炙芍藥枳殼去穰麵炒柴胡澤瀉白朮細辛防風去蘆頭藿香半夏薑汁製各半兩甘草炙一兩茯苓半兩上銼碎如麻豆大每服五錢匕水一盅半煮取八分去滓熱服余滓兩服合為一服重煎空心服附霍亂瘧痢發斑暑證即發為熱病吐瀉霍亂積久後發為瘧痢霍亂瘧痢三證醫書各有專科治法亦詳故不具載姑以主方取效速者附列於下乾霍亂吐法暑氣入腹噁心腹痛上吐下瀉瀉如水注此暑火暴發升降不利清濁不分所瀉者皆五臟之津液宜速止之用五苓散或胃苓湯利小便清火實臟甚者桂苓甘露飲此證間有夾食積者醫家認為食傷而用下誤矣亦有謂其穢濁當去者不知津液暴涸元氣頓傷當立止之為上更有吐瀉無物者為乾霍亂令人立斃急用炒鹽湯或二陳湯探吐之通則易救丹溪亦用理中湯吐恐熱不敢載方二陳湯化痰利氣乾霍亂多煎服之探吐代瓜蒂散瓜蒂性峻而損胃此藥利痰而性平廣陳皮去白一錢五分半夏薑汁炒一錢雲茯苓去皮一錢二分甘草三分上㕮咀水煎服痢疾方芍藥湯加減兼治赤白痢白芍藥一錢黃連一錢枳實一錢白茯苓一錢檳榔七分當歸八分黃芩一錢川芎五分大黃二錢加滑石二錢大黃初痢二三日內用一帖動後即去之痢日久者不可用水一盅半煎至八分和木香末三分溫服日夜三服方效香連丸方伯王嵩淮傳自楚府木香二兩黃連茱萸炒八兩廣陳皮二兩槐角子一兩五錢地榆一兩枳殼麩炒二兩枳實麩炒一兩檳榔二兩益元散二兩醋糊為丸每服一錢紅痢米湯下白痢薑湯滾白水送下亦每日三服或湯一丸二丸亦可老弱數服後即當溫補瘧疾方清脾飲加減青皮厚朴白茯苓柴胡半夏黃芩各一錢白朮八分甘草草果仁砂仁各五分滑石二錢渴加麥門冬一錢烏梅一個水一盅半煎至八分和薑汁二匙溫服瘧發過兩個時辰服一帖到瘧臨來前一個時辰再服一帖方效二日一發者先於空日早晚服二帖至臨發日前一個時辰又服一帖方效如服前藥後尚未痊愈即服後劑胃苓湯厚朴薑製炒蒼朮泔水浸炒陳皮一錢甘草炙五分澤瀉雲茯苓豬苓各八分白朮一錢官桂三分上水二盅煎至八分溫服霖按乾霍亂欲吐不得欲瀉不得頃刻危亡恐非二陳湯探吐可通當以屋角結網之大蜘蛛一枚搗爛水沖服即可痛止便通蓋暑濕伏郁之邪賊及太陰濕土非風木之相剋則不劇邪穢深伏上下為之不通風邪肆虐故心腹為之絞痛蜘蛛善能定風風平則土氣得伸而上下皆通矣通後再議進藥若夫霍亂之治雖載方書可不具録然既云附列主方若不辨其寒熱綱領誠恐貽誤來茲凡霍亂吐瀉吐出澄徹而不酸濁瀉出而不臭穢口不渴小溲利此寒證即素問至真要大論諸病水液澄徹清冷皆屬於寒者是也若吐出酸濁瀉出臭穢溲渾口渴此熱證即諸轉反戾水液渾濁諸嘔吐酸暴注下迫皆屬於熱是也轉筋者感風木之變土為木克也夫霍亂吐瀉後每多肢冷如冰脈伏欲絶口渴甚以涼水與之即止若驗其所吐酸臭所下穢惡小溲赤澀此假寒真熱證也口渴喜冷飲卻不多手足逆冷面赤戴陽煩熱發躁揭去衣被若察其瀉出不臭惡吐出不酸穢者陰盛格陽之假熱真寒證也如煩渴躁擾口乾恣飲舌本不冷者乃氣液告竭之候宜兼救陰如吐利止而身痛不休宜兼達表此寒熱之略也然易之山風蠱卦艮上巽下蠱者蟲類也風木之邪剋制濕上則蟲生霍亂之重者殺蟲又不可緩也此義仲景以後未有知者近西士言之司命者亦不可忽又按痢瘧各有專書原不須縷述但清脾飲治少陽正瘧之方胃苓湯治太陰寒濕之瘧溫疸等瘧若誤用禍尚不測況暑瘧乎此書專言傷暑而舍暑瘧不論殊覺未備夫微寒壯熱心煩多汗口渴引飲脈或虛或濡或洪或弦或一日一發或間日一發者即所謂陰氣先傷陽氣獨發之暑瘧也當與內經金匱疸瘧治法相仿然有微甚之不同若因外感觸發伏氣宜清涼滌暑如滑石青蒿生草連翹茯苓竹茹枳實暑熱甚者黃芩黃連皆可加入外邪甚者可加豆豉蔥藿香薄荷之屬若暑熱內動者宜甘寒生津如鮮生地麥冬沙參花粉知母石膏鮮石斛梨汁蔗漿夾濕者可加入蘆根通草六一散熱濕兩重日晡煩痞昏譫而陰氣未見大傷者半夏瀉心合小陷胸去參棗稍挾表邪可佐以豉薄蘇藿蔥白等兩三味是矣若夫十二經之瘧風寒濕及痰食疫瘴諸瘧仍當考之專書茲不載附方半夏瀉心湯半夏半升黃芩乾薑甘草炙人參各二兩黃連一兩大棗十二枚水一斗煮取六升去渣再煎取三升溫服升日三服方中行曰半夏乾薑辛以散虛滿之痞黃芩黃連苦以泄心膈之熱人參甘草甘以益下後之虛大棗甘溫潤以滋脾胃之液曰瀉心者言滿在心膈而不在胃也小陷胸湯栝蔞實大者一枚黃連一兩半夏半升水六升先煮栝蔞取三升去滓內諸藥煮取二升去滓分溫二服鄒潤安曰觀仲景之用栝蔞實在此湯曰小結胸正在心下按之則痛在栝蔞薤白白酒湯曰喘息咳唾胸背痛短氣而其脈一則曰浮滑一則曰寸口沉遲關上小緊數是皆陰中有陽且踞於陽位者也夫胸背痛較按之方痛則甚痹則較結為輕咳唾喘息是其勢為上衝而居於心下按之才痛似反靜而不動此其機總緣氣與飲相阻寒與熱相糾熱甚於寒者其束縛反急而為結寒甚於熱者其蔽塞自盛而為痹是故結胸之病伏胸痹之病散伏者宜開散者且行故一則佐以連夏之逐飲泄熱一則佐以薤酒之滑利通陽栝蔞實之裹無形攢聚有形使之滑潤而下則同能使之下似是治實之方僅能使之下不能使其必通又非純乎治實之道矣何以知不能使之必通蓋有停飲痛甚至不得臥即當加半夏若兼胸滿脅下逆搶心則仍加枳朴桂枝倘竟能通又何必如是哉是知栝蔞實之治大旨在火與痰結於陽位不純乎虛亦不純乎實者皆能裹之而下此其擅長矣發斑方消斑青黛飲治邪熱傳裡裡實表虛血熱不散熱氣乘於皮膚而為斑也黃連去毛一錢甘草五分石膏煅一錢五分知母五分柴胡去蘆五分人參去蘆五分犀角鎊一錢青黛一錢山梔一錢生地一錢大便實者去人參加大黃多寡酌之上㕮咀水二盅薑一片棗二枚煎之捶法臨服入苦酒一匙調服寒溫暑三病有發斑證而暑斑人多忽之不知其形與寒溫同或大如豆或細如線痕或如蚤點甚亦有羊毛疔者皆宜前藥清之服藥總法傷寒傷暑溫涼諸證皆邪氣欺正氣也用藥如對敵藥入則邪漸退藥力盡而邪復熾必一服周時即詳勢診脈藥對則連進日夜三五服以邪退病安為止此法惟漢張仲景傷寒隋孫思邈千金方中載此孫云夏月晝五夜三冬月晝三夜五必期病退而後止如禦敵者愈驅逐愈加精鋭期於蕩平而後班師此萬全之勝算也自宋以後不傳故取效寡而活人之功疏愚以此法屢治人極有神效附刻喻嘉言瘟疫論序張鳳逵之著傷暑全書也翻古人之成案妙生心之化裁可謂善於立言者矣第疫證引説不明關係醫學非小雖以東垣之淵通丹溪之博洽亦隨俗相沿未有確解近喻嘉言先生以通今博古之才著開天闢地之論掃叔和之穢闡仲景之奧不剿陳言獨標新義從來迷謬渙然冰釋至於治法高出千古直髮前人所未發誰謂今人不及古人之精乎故附刊之而以治案名方綴於其後用告業醫之士焉蓋天地以生為心寒熱溫涼四氣遞運萬古不易人生其間感觸寒暑而病者皆其起居無時飲食不節氣虛體弱自行犯之非寒暑之過也然亦不過千百之一二耳若以寒暑為殺厲之氣觸之即病則人無噍類久矣豈天地生人自然之道哉至非其時而有其氣謂之不正之氣則可謂之疫氣則非也何也不正之氣人感之者有病有不病未可一概論也若夫疫氣則不論富貴貧賤老幼男女強弱虛實沿門合境傳染相同人無得免者此唯大兵大荒之後則有之而飢饉之年尤甚流離滿野道殣相望或趨鄉鎮或集郡邑或聚都城安置失所賑濟乏術九重萬里呼籲無門三五為群死無虛日千百一冢埋藏不深掩蓋不厚時至春和地氣轉動浮土塌陷白骨暴露血水汪洋死氣尸氣濁氣穢氣隨地氣上升混入蒼天清淨之氣而天地生物之氣變為殺物之氣無形無影無聲無臭從口從鼻而入直犯臟腑正氣閉塞邪氣充斥頃刻云亡莫可救藥説文云疫者民皆病也厲鬼為災斯為疫耳禮記月令云孟春之月先王掩骼埋胔正以是月天氣下降地氣上升誠恐胔骼汙穢之氣隨天地之氣升降溷合為一有害人物故掩埋之此預補造化天無功也蓋以人在氣交之中如魚在水一毫渣滓混雜不得設川澤潑灰池溏入油魚鮮有得生者人受疫氣何以異此是以自古聖君賢相參贊化育燮理陰陽消弭疫端於平日捍患御災煮粥施藥救濟疫害於臨時人無橫夭世躋雍熙文人解為澤及枯骨失其旨矣詎春月當澤及枯骨而夏秋冬之枯骨遂不當澤及哉近有好事之輩設立壇廠每於小兒出痘之年購求夭亡尸骸雖經埋瘞亦必刨集如山架火焚燒烈焰張熾腥聞於天神人掩鼻毒氣熏蒸惡味氤氤流行傳染以致嬰孩生出一等怪症似痘非痘似疹非疹似癍非癍一二日間即涉危篤雖有良醫莫能措手共相詫愕咸謂天生災異不知致此之由頻年以來冤枉赤子何啻數萬離城二三十里即無此症豈非明驗與嗟嗟異端妖術惑世誣民昧者反以為善聚衆譁之斂財助之此倡彼和奔走若狂揆之先王掩骼埋胔之義不大相乖舛耶因序疫症而並及之以望世之學醫者加之意焉時康熙十四年七月朔漁陽林起龍北海識於補拙齋附刻喻嘉言瘟疫論喻昌曰聖世御宇春無愆陽夏無伏陰秋無悽風冬無苦雨乃至民無夭札物無疵癧太和之氣彌滿乾坤安有所謂瘟疫哉然周禮儺以逐疫方相氏掌之則瘟疫之由來古有之矣鄉人儺孔子朝服而致其誠敬蓋以裝演巨象為儺神不過倣佛具形聖人以正氣充塞其間俾疫氣潛消乃位育之實功耳古人元旦汲清泉以飲芳香之藥上已採蘭草以襲芳香之氣重滌穢也後漢張仲景著傷寒論欲明冬寒春溫夏秋暑熱之正自不能併入疫病以混常法至理已畢具於脈法中叔和不為細繹乃謂重感於寒變為溫疫又謂春時應暖而復大寒夏時應大熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣也又謂冬溫之毒與傷寒大異冬溫復有先後更相重沓亦有重輕治法不同又謂從春分節以後至秋分節前天有暴寒者皆為時行寒疫也蓋春夏秋為寒疫冬月為溫疫所以又云三月四月或有暴寒其時陽氣尚弱為寒所折病熱猶輕五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦微後人奉此而廣其義謂春感清邪在肝夏感寒邪在心秋感熱邪在肺冬感溫邪在腎塤篪遞奏舉世若狂矣嗟嗟疫邪之來果為寒折陽氣乘其所勝而直入精神魂魄之臟人無噍類久矣更有謂疫邪無形象聲臭定時定方可言是以一歲之中長幼莫不知病此至病傷寒者百無一二治法非疏里則表不透非戰汗則病不解愈摹愈遠究竟所指之疫仍為傷寒傷溫傷暑熱之正病疏里則下早可知戰汗則失表可知只足自呈敗闕耳夫四時不正之氣感之者因而致病初不名疫也因病致死病氣尸氣混合不正之氣斯為疫矣以故雞瘟死雞豬瘟死豬牛馬瘟死牛馬推之於人何獨不然所以飢饉兵凶之際疫病盛行大率春夏之交為甚蓋溫暑熱濕之氣交結互蒸人在其中無隙可避病者當之魄汗淋漓一人病氣足充一室況於連床並塌沿門合境共釀之氣益以出戶尸蟲載道腐墐燔柴掩席委壑投崖種種惡穢上溷蒼天清淨之氣下敗水土物産之氣人受之者親上親下病從其類有必然之勢如世俗所稱大頭瘟者頭面腮頤腫如瓜殼者是也所稱蛤蟆瘟者喉痹失音頸筋脹大者是也所稱瓜瓤瘟者胸高脅起嘔汁如血者是也所稱疙瘩瘟者遍身紅腫發塊如瘤者是也所稱絞腸瘟者腹鳴干吐水瀉不通者是也所稱軟腳瘟者便清泄白足重難移者是也小兒痘瘡尤多以上疫症不明治法咸委劫運良可傷悼大率瘟疫痘疹古昔無傳不得聖言折衷是以墮落叔和坑塹曾不若俗見摸索病狀反可顧名思義也昌幸微窺仲景一斑其平脈篇中雲寸口脈陰陽俱緊者法當清邪中於上焦濁邪中於下焦清邪中上名曰潔也濁邪中下名曰渾也陰中於邪必內栗也表氣發虛裡氣不守故使邪中於陰也陽中於邪必發熱頭痛項強頸攣腰痛脛酸所謂陽中霧露之氣故曰清邪中上濁邪中下陰氣為栗足膝逆冷便溺妄出表氣微虛裡氣微急三焦相溷內外不通上焦怫鬱臟氣相熏口爛舌斷也中焦不治胃氣上衝脾氣不轉胃中為濁榮衛不通血凝不流若衛氣前通者小便赤黃與熱相搏因熱作使遊於經絡出入臟腑熱氣所過則為癰膿若榮氣前通者陽氣厥微陰無所使客氣入內嚏而出之聲嗢咽塞寒厥相逐為熱所擁血凝自下狀如豚肝陰陽俱厥脾氣孤弱五液注下下焦不闔清便下重令便數難臍築湫痛命將難全凡二百六十九字闡發奧理全非傷寒中所有事乃論血邪從入之門變病之總所謂赤文緑字開天闢地之寶符人自不識耳篇中大意謂人之鼻氣通於天故陽中霧露之邪者謂清邪從鼻息而上入於陽入則發熱頭痛項強頸攣正與俗稱大頭瘟蛤蟆瘟之説符也人之口氣通於地故陰中水土之邪者為飲食濁味從口舌而下入於陰入則其人必先內栗足膝逆冷便溺妄出清便下重臍築湫痛正與俗稱絞腸瘟軟腳瘟之説符也然從口從鼻所入之邪必先注中焦以次分布上下故中焦受邪因而不治中焦不治則胃中為濁營衛不通血凝不流其釀變即現中焦俗稱瓜瓤瘟疙瘩瘟等症則又陽毒癰膿陰毒遍身清紫之類也此三焦定位之邪也若三焦邪混為一內外不通臟氣熏蒸上焦怫鬱則口爛舌斷衛氣前通者因熱作使遊行經絡臟腑則為癰膿營氣前通者因召客邪嚏出聲嗢咽塞熱擁不行則下血如豚肝然以營衛漸通故非危候若上焦之陽下焦之陰兩不相接則脾氣於中難以獨運斯五液下注下焦不闔而命難全矣傷寒之邪先行身之背次行身之前次行身之側繇外廓而入瘟疫之邪則直行中道流布三焦上焦為清陽故清邪從之上入下焦為濁陰故濁邪從之下入中焦為陰陽交界凡清濁之邪必從此區分甚者三焦相混上行極而下下行極而上故聲嗢咽塞口爛舌斷者亦復下血如豚肝非定中上不及下中下不及上也傷寒邪中外廓故一表即散疫邪行在中道故表之不散傷寒邪入胃府則腹滿便堅故可攻下疫在三焦散漫不收下之復合此與治傷寒表裡諸法有何干涉奈何千年憒憒試折衷以聖言從前迷謬豈不渙然冰釋哉治法未病前預飲芳香正氣藥則邪不能入此為上也邪既入急以逐穢為第一義上焦如霧升而逐之兼以解毒中焦如漚疏而逐之兼以解毒下焦如瀆決而逐之兼以解毒營衛既通乘勢追拔勿使潛滋詳訂諸方載春溫方後或問春夏秋蒸氣成疫豈冬溫獨非疫乎余曰冬月過溫腎氣不藏感而成病正與不藏精之春溫無異計此時有春無冬三氣即得交蒸成疫然遇朔風驟起則蒸氣化烏有矣是以西北土高地燥即春夏氣難上升何況冬月之凝沍東南土地卑濕為霧露之區蛇龍之窟其溫熱之氣得風以播之尚有可耐設旦暮無風水中之魚衣中之蝨且為飛揚況於人乎蒸氣中原雜諸穢益以病氣尸氣無分老少觸之即同一病狀矣此時朔風了不可得故其氣轉積轉暴雖有薰風但能送熱不能解涼盛世所謂解慍阜財者在兵荒反有注邪布穢之事矣叔和以夏應大熱而反大寒為疫詎知大寒正疫氣消彌之候乎故疫邪熾盛唯北方始能消受詩惡譖人思欲投畀有北以熄其焰析義精矣疫證治案靖康二年春京師大疫有異人書一方於齋舍凡因疫發腫者服之無不效其方黑豆二合炒令香熟甘草二寸炙黃水二盞煎減半時時呷之泰和二年四月民多疫癧初覺憎寒壯熱體重次傳頭面腫盛目不能開上喘咽喉不利舌乾口燥俗云大頭傷寒諸藥雜治莫能愈漸至危篤東垣曰身半以上天之氣也邪熱客於心肺之間上攻頭面而為腫耳須用下項藥共為細末半用湯調時時服之半用蜜丸噙化服盡良愈活者甚衆時人皆曰仙方謂天仙所制也普濟消毒飲黃芩半兩酒炒黃連五錢酒炒人參三錢陳皮去白二錢甘草二錢連翹一錢黑參二錢殭蠶七分白者炒升麻七分柴胡八分桔梗五分板藍根一錢馬勃一錢鼠黏子一錢炒上為末服如上法或加防風川芎薄荷歸身細切五錢水煎時時稍熱服之如大便燥結加酒蒸大黃一二錢利之腫勢甚者砭針刺之羅謙甫治中書右丞姚公茂六旬有七宿有時毒至元戊辰春因酒再發頭面耳腫而疼耳前後腫尤甚胸中煩悶咽嗌不利身半以下皆寒足脛尤甚由是以床相接作炕身半以上臥於床身半以下臥於炕飲食減少精神困倦而體弱命羅治之診得脈浮數按之弦細上熱下寒明矣內經云熱勝則腫又曰春氣者病在頭難經云蓄則腫熱砭射之也蓋取其易散故也遂於腫上約五十餘刺其血紫黑如露珠之狀頃時腫痛消散又於氣海中大艾炷灸百壯乃助下焦陽虛退其陰寒次三里二穴各灸三七壯治足胻冷亦引導熱氣下行故也遂處一方名曰既濟解毒湯既濟解毒湯黃芩一錢酒炒黃連一錢酒炒桔梗一錢甘草生五分柴胡五分升麻七分連翹一錢歸身一錢酒洗大黃一錢酒煨水二盞煎一盞徐徐溫服論曰熱者寒之然病有高下治有遠近無越其制度以黃芩黃連苦寒酒製炒以為因用以瀉其上熱以為君桔梗甘草辛甘溫上升佐諸苦藥以治其熱柴胡升麻苦平味之薄者陰中之陽散發上熱以為臣連翹苦辛平以散結消腫當歸辛溫和血止痛酒煨大黃苦寒引苦性上行至巔驅熱而下以為使投劑之後腫消痛減大便利再服減大黃慎言語節飲食不旬日良愈總帥相公近年七旬戊午秋南征過揚州俘虜萬餘口內選美色室女近笄年者四置於左右豫因曰總帥領十萬衆深入敵境非細務也況年高氣弱凡事宜慎且新虜之人驚憂氣蓄於內加以飲食不節多致疾病近之則邪氣相傳其害為大總帥笑而不答其副帥時亦在坐異日召豫曰我自十三歲從徵回鶻此事飽經汝之言深可信矣至臘月中班師值大雪三日新掠人不耐凍餒皆為頭疼咳嗽腹痛自利多致死亡者逮春正月至汴隨路多以禮物來賀相公因痛飲數次遂病脈得沉細而弦三四動而一止其證頭疼咳嗽自利腹痛與新虜人病無異其脈短澀其氣已衰病已劇矣三日而卒邪氣害人其禍如此內經云乘年之虛遇月之空失時之和因而感邪其氣至骨又曰避邪如避矢石錢仲陽亦曰糞履不可近襁褓嬰兒多生天吊驚風亦由正氣尚弱不能勝邪故也由是觀之聖賢之言信不誣矣成化二十一年新野疫癧大作死者無虛日鄰人樊滋夫婦臥床數日矣余自學來聞其家人如殺羊聲不暇去衣巾急往視之見數人用綿被覆其婦床下致火一盆令出汗其婦面赤聲啞幾絶余叱曰急放手不然死矣衆猶不從乃強拽去被其婦躍起倚壁坐口不能言問曰飲涼水否頷之與水一碗一飲而盡始能言又索水仍與之飲畢汗出如洗明日愈或問其故曰彼發熱數日且不飲食腸中枯涸矣以火蒸之速死而已何得有汗今因熱極投之以水所謂水火既濟也得無汗乎觀以火然枯鼎雖赤而氣不升注之以水則氣自來矣遇此等證者不可不知江篁南治給事中遊讓溪嘉靖壬子正月忽感大頭風症始自頸腫時師以為外感而誤表之繼以為內傷而誤補之面發赤太陽俱腫頭頂如裂身多汗寐則譫語綿延三日喘咳勢急其親汪子際以竹茹橘皮湯繼以川芎茶調散合白虎湯去人參服一劑而減次日用前方去寒峻藥至晚漸定目輪發水泡數個余腫漸消獨耳後及左頰久而不散又次日以當歸六黃湯為主加散毒之藥延及兩旬頂巔有塊如雞子大突起未平及面頰余腫未消有時頭疼大便稀溏時二月中旬江至診得左脈浮小而駃右脈大近快有勃勃之勢江按脈症當從火治以生黃耆八分白朮薏苡各一錢半茯苓片芩各八分生甘草三分煎加童便服次日脈稍平然兩頰尚赤早間或覺頭痛蓋餘火未全殺也黃耆加作一錢二分薏苡加作二錢頂塊漸消以後加生耆二錢更飲緑豆湯童溲五劑而愈宿按陽明邪熱兼少陽相火為病視其病勢在何部隨經處治當緩弗令重劑過其病所陽明為邪首大腫少陽為邪出於耳前後豫每治此症初用涼膈散繼以消毒飲無不立愈嘉靖己未五六七月間江南淮北在處患時行瘟熱病沿門闔境傳染相似用人參敗毒散倍人參去前胡獨活服皆盡效全無過失萬曆十六年南都大疫死者甚衆余寓雞鳴僧舍主僧患疫十餘日更數醫皆云禁飲食雖米飲不容下咽病者飢甚哀苦索食余曰奪食則愈雖有是説此指內傷飲食者言耳諺云餓不死傷寒乃邪熱不殺穀雖不飲食亦不致死經云安穀則生況病挾內傷不足之症禁食不與是虛其虛安得不死雖與稀粥但不使充量進補中益氣湯而愈若此類者甚衆余未當禁飲食而活者不少每見都城諸公但説風寒二字不辨有無內傷虛實一例禁絶飲食有二十餘日邪氣已盡米飲尚不容入口而餓死者有限表而出之以為習俗之戒萬曆戊子己丑年時疫盛行凡服人參敗毒散發表者無不全活江應宿治陳氏子年十七歲患疫大渴大熱頭痛如破泄瀉頻數六脈洪大與三黃石膏湯日進三服石膏加至一兩三日而愈何氏僕患天行時疫目不識人狂言妄語投以地漿童子小便浸白頭頸蚯蚓搗細新汲井花水濾下清汁任服一二碗即知人三日愈壺仙翁治文學張薇伯病風熱不解時瘟疫大行他醫診其脈兩手俱伏曰此陽證見陰不治欲用陽毒升麻湯升提之翁曰此風熱之極火盛則伏非陰脈也升之則死矣卒投連翹涼膈之劑一服而解橘泉翁治一人病頭面項喉俱腫大惡寒醫疑有異瘡翁曰非也此所謂時毒似傷寒者丹溪曰五日不治殺人急和敗毒散加連翹牛蒡子大黃下之三日愈俗名發痧之症江南舊無今隨地有之醫家不載大凡才見寒栗四體懈怠頭痛身熱狀似傷寒發瘧其治或先用熱水蘸搭臂膊而以苧麻刮之甚者或以針刺手足出血或以香油燈照視背有紅點處皆烙之以上諸法皆能使腠理開通血脈舒暢而愈有用艾灸以得沙為良或因灸膿血迸流移時而死者誠可憐也有雍承節印行方云初得症以飲艾湯試吐即是其症也急以五月蠶退紙一片碎煎安碗中以碟蓋密以湯泡半碗許仍以紙封碟縫勿令透氣良久乘熱飲之就臥以衣被蓋之令汗出愈一婺婦身肥常患發沙之症每用苧麻刮之即愈輒愈輒發不出二三日醫用四物等治反加鼻衄江以香附撫芎黃芩梔子等開鬱降火清熱之劑與之數服而愈不復發以上二條系類案崇禎壬午癸未時疫盛行道䎕相藉各處醫者發汗和中藥內唯用人參者多以活人治疫名方黃連解毒湯見前黃連阿膠湯治下利膿血煩躁不得臥黃連二錢黃芩一錢芍藥一錢雞子黃一枚阿膠錢半水二盞煎三物至一盞去渣內膠煎一二沸再內雞子黃和勻服日三服黃連湯治胸上有熱胃中有邪氣腹痛欲嘔吐者黃連一錢甘草一錢乾薑一錢人參五分桂枝三分半夏五分大棗一枚黃連瀉心湯黃連生地黃知母各錢半甘草生五分水盞半煎八分溫服黃連龍骨湯治腹痛咽痛體熱煩苦黃連黃芩芍藥各八分龍骨五分為末水盞半煎八分服黃連犀角湯治狐惑犀角三錢磨汁黃連二錢烏梅四個木香三分磨汁水盞半煎八分入犀角汁木香汁和勻服黃連橘皮湯治疫毒發狂下部生瘡黃連一錢橘皮七分杏仁七分麻黃六分葛根六分厚朴五分甘草五分水盞半煎八分服黑膏治疫毒發斑嘔逆生地黃二兩六錢好豉二兩六錢豬膏十兩合煎令三分減一絞去滓取濃汁如膏入雄黃豆大麝香少許和勻分三服以上系喻嘉言尚論春溫篇解毒八方人參敗毒散見前藿香正氣散見前九味羌活湯見前消毒飲治疫毒頭皮腫痛及赤丹火丹牛蒡子一錢炒荊芥一錢甘草六分防風六分麥門冬五分升麻五分犀角一錢磨汁桔梗八分朴硝錢半水二盞煎八分入犀角汁服犀角消毒飲治毒氣發斑痛癢牛蒡子二錢炒防風二錢荊芥一錢甘草八分犀角磨汁每服三錢水煎入犀角汁服羌活升麻湯治時行疫病清熱解毒羌活升麻葛根芍藥人參黃芩各一錢黃連石膏生甘草生生地知母生各七分水二盞薑三片棗一枚煎八分溫服漏蘆湯治臟腑積熱發為腫毒時疫疙瘩頭面洪腫咽嗌堵塞水藥不下一切羌惡疫癧漏蘆升麻大黃黃芩各一兩藍葉黑參各二兩上六味為粗末每服二錢水盞半煎至六分去渣溫服腫毒甚加芒硝二錢半消毒丸治時疫疙瘩惡證大黃牡蠣燒殭蠶炒各一兩上為末蜜丸彈子大新汲水化下一丸無時雄黃丸治疫不相染雄黃一兩研赤小豆炒熟丹參鬼箭羽各二兩共為細末煉蜜為丸如梧子大每日空心以溫水下五丸雖同床共屋不相染運氣五瘟丹黃芩黃柏黃連山梔香附紫蘇大黃甘草梢上八味生用於冬至日為末將大黃三倍煎滾湯渣和藥丸如雞子大硃砂雄黃為衣再貼金箔一丸取泉水七碗浸化可服七人前藥乙庚年黃芩為君丁壬年山梔為君丙辛年黃柏為君戊癸年黃連為君甲己年甘草梢為君為君者多一倍也餘四味與香附紫蘇為臣者減半也大青丸治時行瘟疫發熱上膈熱薄荷梔子黃芩黃連各三錢連翹六錢甘草三錢大黃白龍粉各八錢上為末用青蒿自然汁為丸緑豆大雄黃為衣每服五六十丸白湯送下三黃石膏湯見前太無神朮散治四時瘟疫頭痛項強寒熱身痛專主山嵐瘴氣蒼朮厚朴陳皮甘草石菖蒲藿香各一錢水盞半薑三片棗一枚煎八分服升麻葛根湯治疫症無汗發熱口渴者升麻葛根芍藥甘草各等分上水煎服人參白虎湯見前二黃湯治大頭時疫黃芩酒炒黃連酒炒生甘草各等分每服五錢水盞半煎八分稍溫徐徐呷之救急解毒丸治時行疫氣咽喉腫痛項筋粗大舌強聲啞鼻塞氣悶水漿難進危在須臾非此不救兼治頭面浮腫疙瘩堅硬浸淫濕瘡耳內流膿眼眩赤腫口內糜爛等症甘草二兩桔梗二兩荊芥一兩防風一兩連翹一兩酒芩一兩酒連一兩薄荷一兩升麻一兩酒大黃一兩殭蠶五錢蒲黃五錢青黛五錢盆消五錢射干五錢以上共為極細末羅淨以烏梅湯調柿霜和丸如圓眼大噙化煎湯亦可茵陳五苓散治疫癧黃疽茵陳五錢五苓散四錢和勻每服四錢食前米湯調服或濃煎茵陳湯調五苓散參苓平胃散治腹脹黃腫腸鳴泄白厚朴薑汁炒陳皮各五兩蒼朮半斤米泔水浸炒茯苓甘草炙人參各二兩共為細末每服三錢或五錢薑棗湯調下神授香蘇散治瘟疫昔有城中大疫一白髮老人教富人合施病者皆愈疫鬼相顧曰此老教三人矣遂遁紫蘇香附醋製各二兩陳皮去白一兩甘草五錢共為細末每服三錢水盞半煎八分溫服制人中黃法冬月以竹筒一段刮去青兩頭留節一頭打通一竅以大甘草切碎內竹筒中以木塞孔周密投糞缸中浸二三月到清明取出曬乾收貯待用大治疫毒一逢疫癧之時用貫衆一二枚旁浸日用水缸中烹茶煮飯一切俱用此水疫不能染活人甚驗凡遇天行時氣恐其相染須遲出早入房中常燒蒼朮以其避瘟驅邪鼻孔塗雄黃口中嚼大蒜最良老君神明散東坡聖散子此二方皆一派辛熱燥裂有毒之藥全無扶正驅邪逐穢解毒之品不知醫書何以列之疫條必系後人偽託學者慎勿徇名妄用害人非淺虞天民辨之最詳不可不考
