body:
  text: 跋李以理有言我有所見輒不能忘我有所得得不能公此與無見無得何異有所見欣然忘之有所得廓然公之乃昔人傳道之虛懷不必身之所至目之所營使聞者心領神會有以悟於語言象數之外妙哉論至此乎豫雖不敏心竊嚮往之為之執鞭所願樂焉故有是刻康熙歲在乙卯秋月漁陽林起龍自跋
