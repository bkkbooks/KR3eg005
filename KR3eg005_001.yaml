body:
  text: 卷上辨春夏秋冬溫暑涼寒四證病原生氣通天論曰夫自古通天者生之本本於陰陽天地之間六合之內其氣九州九竅五臟十二節皆通乎天氣其生五其氣三數犯此者則邪氣傷人此壽命之本也由此論之人身元氣與天相通頤養有道病何從生然則病生有因其發有原乎從其原而治之則易療陰陽應象大論曰天有四時五行以生長收藏以生寒暑燥濕風人有五臟化五氣以生喜怒悲憂恐又曰因於露風乃生寒熱是以春傷於風邪氣留連乃為洞泄夏傷於暑秋為痎瘧秋傷於濕上逆而咳發為痰厥冬傷於寒春必病溫四時之氣更傷五臟此四時四氣之病原也黃帝明以春溫根於冬寒其間氣候相近症恙相同猶可言者原未兼及暑也至漢張長沙仲景著傷寒書遂演內經之說曰其傷於四時之氣皆能為病以傷為毒者以其最成殺厲之氣中而即病者名曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病暑病者熱極重於溫也自此論出而後之業岐黃術者皆宗之果爾是專主一寒氣三病分久近皆寒為根故後世醫家有四時傷寒之說甚至通以麻黃桂枝湯兼治溫熱症誤人良多陶節庵諸名家亦剖三病若列眉而根始於寒不免沿而未能脫又何怪乎碌碌者愚謂道以一氣生天地以二氣生五行五氣各司其用而水火為最要水火能生物亦能殺物若仲景之說是水專擅其權而火為虛而無用矣愚為冬之寒病專屬寒威此固然不易者至春時陽氣漸舒孔竅開張服御單夾乃天氣變幻倏暖倏寒又多蕩風人感寒直入臟腑故為溫病猶可名曰春寒已與冬寒不相蒙矣況夏至後炎火時流蒸郁爍人得病似傷寒者皆是暑火所感而成與冬之寒氣毫不相涉而亦以為冬寒之積久所發者誤矣即生氣通天論曰是故陽因而上衛外者也因於寒欲如運樞起居如驚神氣乃浮因於暑汗煩則喘喝靜則多言體若燔炭汗出而散是寒暑分因水火別證明列斷案萬世醫學之祖也又何惑乎然內經之溫根於寒者何故案山海經桂名招搖葉長二尺桑名帝女大圍五十尺桂竹葉大二尺余高數丈其草樹奇怪類若此據經想太古時洪水橫流懷山襄陵草木閉塞天地矇昧陰靄拂鬱陽明未舒以故寒氣盛行元和令少即當大夏亦無爍金之患後世文明漸開五行分布水火之氣各司其權若斯爭烈者即今春值淫雨余寒為厲甚者如隆冬挾纊不能去試觀晉中暑證寥寥絶無痎瘧皆陰勝之左券也何況古洪荒世乎此內經溫根於寒所由發也何仲景遂申演其說並暑而一類乎是蛇足也且古人茹毛衣草簡緣淡薄無助火之具後世炙煿之味適口醲郁之酒充腹嗜欲灼精塵勞食氣皆足以噓焰而煽熾宜暑火之乘類而善入也謂古之寒病多而暑病少今之寒暑並重而暑為尤劇則可愚故特列論曰傷寒者感於冬之嚴寒溫病者感於春之輕寒若暑病則專感於夏之炎熱若冰炭霄泉之不相及一水一火各操其令治法一熱劑一涼劑各中其竅而概以為寒因不幾於執一遺二哉豫俯仰躊躇萬不得已敢於翻千古之案以開百世之覺破迷而拔苦遂自甘於僭竊云耳霖按素問生氣通天論言春傷於風邪氣留連乃為洞泄夏傷於暑秋為痎瘧秋傷於濕上逆而咳發為痿厥冬傷於寒春必病溫此四時伏氣之機陰陽互根之理也春傷於風者陽邪也留連日久乃下為洞泄之陰病秋傷於濕之陰邪乃為上逆而咳之陽病夏傷於暑熱之陽邪至秋髮為痎瘧之陰病冬傷於寒之陰邪至春必發為溫熱之陽病是陰陽上下之相乘也此六淫之邪傷人由人身之陰陽不固故金匱真言論曰夫精者身之本也故藏於精者春不病溫夏暑汗不出者秋成風瘧足徵人身之氣血皆生於精冬宜閉藏則陰氣固密若縱欲精耗則陰虛陰虛則陽邪易犯故多病溫夏宜疏泄逆之而汗不出汗不出則暑邪內伏遇秋風悽切寒熱相戰則為瘧病陰陽啓閉時氣宜然舉冬夏言其春秋伏氣自可類推而陰陽應象論又重復言四時伏氣者蓋六淫之邪亦由七情不慎五臟化五氣為內賊以傷之此內經反復闡明伏邪之義也又按素問熱論曰今夫熱病者皆傷寒之類也越人五十八難曰傷寒有五有中風有傷寒有濕溫有熱病有溫病其名各不同是傷寒為古醫經之通稱可證仲景太陽篇首揭發熱汗出惡風脈緩者名中風惡寒發熱體痛嘔逆脈陰陽俱緊者名傷寒發熱而渴不惡寒者為溫病發汗已身灼熱脈陰陽俱浮者為風溫辨論寒溫形證朗若列眉治暍三法尤有深義奈書經兵火散佚雖高平王叔和編次僅存傷寒治法而溫暑亡失益多不得拉雜叔和序例中語妄議仲景寒溫莫辨也內經溫根於寒謂嚴寒遏熱乃習坎之義亦不須遠引洪荒曲為解說溫病固非春日之輕寒暑病亦非專感夏日之炎熱欲明溫暑伏氣之義當細參內經庶不為群言所惑天時真源曰天地之間親乎上者為陽自下而上四萬二千里乃曰陽位親乎下者為陰自上而下四萬二千里乃曰陰位既有形名難逃度數且一歲者四時八節二十四氣七十二候三百六十日四千三百二十辰十二辰為一日五日為一候三候為一氣三氣為一節二節為一時四時為一歲一歲以冬至節為始是時也地中陽生升凡一氣十五日上升七千里三氣為一節四十五日陽升共二萬一千里二節為一時一時九十日陽升共四萬二千里正到天地之中而陽合陰位是時陰中陽半其氣為溫而時當春分之節也過此陽升而入陽位方曰得氣而升亦如前四十五日立夏立夏之後四十五日夏至夏至之節陽升通前計八萬四千里以到天乃陽中有陽其氣熱積陽生陰一陰生於二陽之中自夏至之節為始是時天中陰降凡一氣十五日下降七千里三氣為一節一節四十五日陰降共二萬一千里二節為一時一時九十日陰降共四萬二千里正到天地之中而陰交陽位是時陽中陰半其氣為涼而時當秋分之節也過此陰降而入陰位方曰得氣而降亦如前四十五日立冬立冬之後四十五日冬至冬至之節降極通前計八萬四千里以到地乃陰中有陰其氣冷積陰生陽一陽生於二陰之中自冬至之後一陽升如前運行不已周而復始即陽升陰降之八節而知天地即溫涼寒熱之四氣而識陰陽夫陰陽判分若黑白然故春夏秋冬四時隨令各別溫熱涼寒四時隨節候變易冬至已後至春分屬傷寒自春分至夏至屬溫病自夏至至白露屬傷暑自白露至立冬屬涼病自立冬以後至春俱屬傷寒蓋春秋之氣嘗不足冬夏之氣嘗有餘即四月八月間亦有暑病蓋八月間曉暮夜氣雖涼而午未之時秋陽燥烈日火灼人反毒於伏蓋伏時氣發汗出陽氣在表此時陽氣漸斂真火內燃而又以烈日熏之故毒易中人熱證更劇當細察之雖其外證相類而受氣不同治法迥異稍有不中節害人不淺而概用以寒證劑其害可勝言哉治者先數時令後審時氣隨令加減斟酌之未有不立取效者故為天時說霖按論四時陰陽升降即十二闢卦六陰充足於十月亥陰極則陽生故十一月冬至一陽生於下為地雷復卦二陽生為地澤臨三陽生為地天泰四陽生為雷天大壯五陽生為澤天央至四月六陽充足則為乾卦陽極陰生故五月夏至一陰生於下為天風姤卦二陰生為天山遁三陰生為天地否四陰生為風地觀五陰生為山地剝至十月六陰純靜則為坤卦夫坤為萬物之母坤靜而純陰何能生物必待乾與之交得其陽而後始能生萬物也然交必陽體充足乾之六陽乃充足於四月之巳次為午乾至五月夏至陽氣升極則下交感坤陰之氣上承故一陰動於下為天風姤也再交於六月未三交於七月申所謂坤三索於乾也乾陽潛藏於坤陰至冬至一陽動於下故為地雷復也此陰陽消長之機不可移易者也然既明陰陽升降消長之理闢叔和序例寒毒藏於肌膚春變為溫夏變為暑是矣然不得界劃時日為溫熱涼寒未免緣木求魚夫治病之法首當察其微甚辨其陰陽觸類旁通則頭頭是道冬至陽生井泉溫人身所伏者陽熱被冬日嚴寒所折藏於肌骨之間或為外邪逗引或為情欲所傷感而觸發伏氣至淺感寒至重則為傷寒伏氣日久較重至春感風熱而發者則為春溫伏氣至重延至立夏後夏至前為情欲所傷而發者則為熱病然微甚之機又不必泥執立夏前為溫夏至前為熱惟當以伏氣之輕重以分溫熱也若夫夏至陰生井泉寒人身所伏者陰濕伏氣微感天日之陽熱重者陰邪易消惟餘熱熾自當以辛寒泄熱伏氣重所感之陽邪微宜用苦溫以燥濕設表裡兩重又當消息香薷飲以加減矣活法運乎一心固不可囿於方圓之中亦不可出於規矩以外天時人事其庶幾乎地氣天地之形其狀如卵六合於中其圓如球日月出沒運行於天之上地之下上下東西周行如飛輪春夏日行北陸秋冬日行南陸太陽所臨其氣燠故四方風氣各有偏勝秦晉地氣寒遂寒病多而暑病少吳越滇黔及粵地氣暖故寒病常而暑病獨劇至八九月猶如伏時彼中盲醫不知率以治寒劑投之以火助火又且禁人飲水食瓜至不可救豫萬曆丙午典試粵四棘闈中簾官廝役多病此呻吟聲相聞醫皆以為寒豫詰之曰某日曾風雨爾曾服絮否皆如法用涼劑而痊撫臺楊公異而索方豫冗中姑抽胸臆數款並方楊公遂付之梓題曰張司農活人說今其板貯西粵藩司中楊公仁者乎急於濟人如此地氣不同治法亦異猶越人見罽而駭毳燕人見布而疑黂氣局之識圉之耳安可一概施藥哉寒而但見其寒限於今也熱而不知其熱拘於古也豫慮大迷不解特變而表之霖按地形如球凡日光所臨之赤道其氣暖故南北皆有冰海也以中國言西北高原病多風寒東南卑下病多濕熱豆疹一證相傳為馬伏波徵南所染流入中原蓋南越為君火之方得氣最先北口外至今未有豆患緣寒水凝結之鄉君火之氣不及素問異法方宜論不可不究心研玩也辨寒暑證各異傷寒傷暑二證流毒天地沿襲古今人率習而不察據其外證頭痛身痛發熱惡寒等證相同皆混於象而不審內景不觀乎時因一名之曰寒而不知其岐多端甚不可一律論者寒之傷人也一二日在膚宜汗三四日在胸宜吐五六日在臟宜下確有定期可據者若暑則變幻無常入發難測不可尋想彼暴中之激烈扁鵲不及攦指而投咀久伏之深毒長桑不能隔膚而見臟最為難察而難救已即尋常之感亦難覺知非若傷寒之有定期定證可據可療者不拘表裡不以漸次不論臟腑冒暑蒸毒從口鼻入者直中心胞絡經先煩悶後身熱行坐近日熏爍皮膚肢體者即時潮熱煩渴入肝則眩暈頑麻入脾則昏睡不覺入肺則喘咳痿躄入腎則消渴非專心主而別臟無傳入也中暑歸心神昏卒倒暑傷肉分周身煩躁或如針刺或有赤腫蓋天氣浮於地表故人氣亦浮於肌表也冒暑入腸胃腹痛惡心嘔瀉伏暑即冒暑久而藏伏三焦腸胃之間熱傷氣而不傷形旬日莫覺變出寒熱不定霍亂吐瀉膨脹中滿瘧痢煩渴腹痛下血等自入肝至此採醫學入門並主治法皆以清內火為主而解表兼之寒之中人乘其虛暑則虛實並中而實更劇蓋氣血強盛之人內已有伏火加之外火炎炎相合故焦灼為甚經虛處寒棲之經實處暑棲之寒凌其弱而暑親其類也又藜藿常被寒惟膏粱獨能御若暑則不問膏粱藜藿而咸能勝之侮之雖廣廈纍冰蕙質生粟輕羅紈綺冷冷玉樹一犯其烈焰詎能卻之乎是以知暑氣之毒甚於寒乃古人專以寒為殺厲之氣而不及暑何也試觀寒病至七八日方危暑病則有危在二三日間者甚至朝發暮殆暮發朝殆尤有頃刻忽作拯求不及者如暑風乾霍亂之類然則暑之殺厲之氣視寒尤甚彰明較著矣寒病止一途察脈審候執古方以療之易為力暑證多歧中熱中暍中內中外甚者為厥為風為癲癇即發則泄瀉霍亂乾霍亂積久後發則瘧痢瘡瘍種種病名約有十餘科皆暑為厲則暑殺厲之氣視寒不幾倍哉除暴中暴發久伏後發不可度量其餘受發亦有漸次焉蓋盛夏之時熱毒鬱蒸無論動得靜得其初入人也不識不知外之流火與內之陽氣驟遇而爭陽氣不服先昏憒倦疲及火與氣合氣不能勝火力雖漸散為外熱燒灼不已氣耗而血枯故燥渴痞塞腹痛諸惡證作焉此其變化或乍或久人莫自覺醫家亦不能辨至病深而後施治故難速愈宜早辨而早治之則易愈而取效速霖按此篇辨暑證精細入微辨傷寒尤有未盡然寒暑辨易溫暑辨難請詳溫暑之辨以補司農未盡之義素問熱論曰凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑暑當與汗出勿止此節經義不明久矣詮釋家多以冬傷於寒伏寒化熱發於夏至前為溫病發於夏至後為暑病暑即熱也溫為熱之漸熱為溫之甚解殊不知傷寒為外感通稱故上經有熱病類傷寒之文越人作傷寒有五之辨此言凡病傷寒而成溫者謂溫病熱病之類乎作寒者非謂先病傷寒轉輾不愈而成溫成熱也且此一節也亦專論伏氣而言當作兩截看凡病傷寒而成溫者先夏至日為病溫為一截蓋言凡病類乎傷寒之溫病在夏至前發者乃冬至後陽熱被嚴寒殺厲之氣折伏至春夏間因感觸發謂之病溫後夏至日者為病暑暑當與汗出勿止為一截此即夏暑汗不出者秋成風瘧之互詞夏至陰生人身所伏者陰氣遇天日之陽熱蒸地氣以上騰人在氣交中感之為暑病熱濕相搏熱蒸濕為汗熱清則汗止故曰當與汗出勿止也夫溫暑之治其清熱雖同而一宜兼益陰一宜兼滲濕陰陽之機有間安可概論泥執暑為熱病熱乃溫之甚者非也暑證立夏以後暑熱盛行時人有頭疼噁心身熱惡寒手足厥冷肢節沉痛不思飲食或氣高而喘或氣短而促甚者用手捫之如火燎皮膚或腹腸絞疼或口鼻流血病候與傷寒相似不知者誤認傷寒用風熱發汗藥或加衣出汗則元氣益虛終不知悟蓋此證乃夏屬陰虛元氣不足濕熱蒸人暴傷元氣人初感之即骨乏腿軟精神倦怠昏睡懶語其形如醉夢間或無汗或微汗不斷或大汗不止煩渴飲水胸膈痞悶小便黃而少大便溏而頻或嘔或瀉或結或霍亂不止此等證與傷寒大異按時而施治據證而急療無不應手者語曰勿伐天和正因時之道也亦有不頭痛身痛惡寒者治法皆同治法輕者以五苓散以利小便導火下瀉而暑自解或香薷飲辛散以驅暑毒木瓜制暑之要藥也或藿香正氣散十味香薷飲之類重者人參敗毒散桂苓甘露飲竹葉石膏湯白虎湯之類弱者用生脈散清暑益氣湯補中益氣湯等若不分內外不論輕重強弱一概以和解百發百中隨試隨應則無如六和湯最良矣方書名家古今甚衆其中多所發揮明切精密者惟朱丹溪為最詳且要近世著作王宇泰先生有證治準繩證治類方諸帙獨得其解批窾中竅轉丸遊刃之技力追古名流已工醫者所當時披誦而潛玩者也治方見後霖按暑證論治此篇要言不煩可作醫門棒喝然未若仲景治暍精簡也第一節言暑證總綱論曰太陽中暍發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發其汗則惡寒甚加溫針則發熱甚數下之則淋甚夫暑為天日之陽邪由口鼻皮毛襲入者多先見寒熱其身重疼痛脈弦細芤遲者暑多兼濕蓋弦細芤遲中寓濡象挾濕故也太陰主表膀胱亦主表熱邪傷氣故小便已灑灑然毛聳也手足冷者陽氣內鬱而不能外達也熱濕盛於內氣淫於外故氣出身熱口開齒燥也若發汗則更傷其表氣溫針則益其燥熱下之則熱邪內陷此示人以暑病之脈證禁忌而不出方也第二節論曰太陽中熱者暍是也汗出惡寒身熱而渴白虎加人參湯主之此言熱甚者宜清熱生陰也第三節論曰太陽中暍身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也一物瓜蒂湯主之此言濕甚熱微者以瓜蒂去身面四肢水氣水去暑無所依則自解觀其三法鼎峙由此類推其熱濕微甚治暑已無餘蘊誰謂長沙知治寒而不知治暑哉暑厥夏月有卒然暈倒不省人事手足逆冷者為暑厥此陰風也不可驟用寒涼藥先以辛溫藥散解之俟醒然後用辛涼以清火除根誤用熱藥及艾灸立死童便和薑汁灌亦易蘇霖按暑厥乃熱邪閉塞諸竅先以紫金錠涼水磨服一二錢俟厥回或以竹葉石膏湯或以黃連香薷飲夾濕者白虎加蒼朮湯陰虧者麥冬湯或生脈散消息加減治之西瓜蘆根蘿蔔甘蔗諸汁清涼滋潤之品皆可與服此言暑厥若寒厥誤認為熱則禍不旋踵然其寒熱之辨不可不知凡四肢逆冷身冷麵青蜷臥手足指甲青黯腹痛不渴小便清白大便溏泄脈微遲者陽衰於下之寒厥也若四肢厥逆身熱面赤唇燥口乾舌苦目閉或不閉煩渴小便短澀大便燥脈滑者陰衰於下之熱厥也然而寒厥亦有忽然煩躁不寧欲坐臥泥水井中此陰極發躁之戴陽證不可作熱治熱厥亦有肢冷脈伏乃熱邪入里氣血不得宣通所謂火極似水也不可作寒治夫卒然不省人事肢冷脈伏何以辨其脈之滑數為熱微遲為寒那雖然兩手六部脈乍不見而尺中應有一兩部未伏設兩手雖伏十二經動脈中必有兩三部不伏即在此未伏脈中仔細尋其微遲滑數以定寒熱若果全身之脈皆伏其人已氣悶而絶矣夫暴厥之因實繁此就寒熱而論然不獨寒熱當辨即溫暑同為熱深之厥其治有間而況寒熱乎是不容不辨也暑風忽然手足搐攣厲聲呻吟角弓反張如中惡狀為暑風亦有先病熱後甚漸成風者譫語狂呼浪走氣力百倍此陽風也治法以寒涼攻劫之與陰風不同皆宜解散化痰不宜汗下有日久而脾胃弱者宜溫補霖按暑風即痙也痙甚則厥近世雖嚴寒溫之防而取重於安宮至寶清營紫雪之類全是溫病伏氣治法與中暑之痙厥究隔一間經言先夏至為病溫後夏至為病暑蓋夏至陰生太陰濕土用事濕熱火三氣交蒸合而為暑異乎春夏木火司令觸發伏氣之溫熱也夫暑邪由口鼻吸入直逼血絡鼓動內風風火盤旋勢不可遏此少陽相火太陰濕土厥陰風木三氣合邪奔竄無常故為痙為厥也蓋手少陽三焦相火與手厥陰包絡相通暑熱之邪內襲招引相火火動風生則肝木失養故筋攣脈急風煽火識則包絡受邪故神識昏迷身中之氣隨風火上炎而有升無降常度盡失由是而形若尸厥矣正內經所謂血之與氣並走於上則為暴厥者是也外竄經絡則成痙內逼膻中則為厥其治速宜熄風泄火達絡疏肝急折其勢以平其暴不令其煎熬胃液甚則用釜下抽薪法以白頭翁湯消息治之直折其厥少之盛待勢稍衰再議清通包絡漸進化痰養陰清濕之劑此正治也更有暑邪熱極脈微而躁肢冷膚冷面赤氣短大汗不止而舌潤或手拘攣瞀亂昏迷者乃邪熱逼汗為陽越之證急宜參附加童便以回陽俟蘇後再以清暑養陰以善其後否則亡陽不救然苟非脈微足冷汗出舌潤則仍是熱證誤用參附即死若無真知灼見不可輕試要亦不可不知也暑瘍凡癰疽毒瘡發熱有時晡甚旦止若夏月間有頭面外項赤腫或咽喉腫痛或腿足掀腫長至數寸不能動履人皆疑為瘡但其頭痛內燥晝夜發熱不止自與瘡證不同但以敗毒散加石膏黃連等藥熱證一解赤腫自消全無膿血此名暑瘍毫釐而千里者也霖按暑瘍一證熱勝者紅腫堅痛風勝者則癢濕勝者多膿水治宜清達泄熱消風祛濕當權其微甚以消息之暑瘵盛暑之月火能灼金若不禁辛酒脾火暴甚有勞熱燥擾而火動於心肺者令人咳嗽氣喘驟吐血衄血頭目不清胸膈煩暍不寧即童稚老夫間一病此昧者以為勞瘵不知火在血上非真陰虧損而虛勞者等也宜四物湯黃連解毒二陳湯三藥內去川芎白芍黃柏以貝母易半夏加桔梗以抑之薄荷以散之麥冬五味以斂之自愈或加童便藕汁或黃連香薷飲一二劑亦可靜攝數日忌酒煎炒自安是名暑瘵宜酌而善用焉或用東垣參苓調中亦妙霖按暑瘵乃陰氣不生陽氣不潛證見咳血吐血日晡煩蒸早間清爽舌白口渴頭脹身疼皆暑熱之邪內襲陰劫絡傷雖有宿恙亦當先清絡熱宜沙參甜杏仁川貝蔞皮連翹麥冬竹葉鮮生地等味鮮荷葉汁一杯和服尤有奇功俟血止後再議育陰若先後失序或誤用溫補則絡中伏熱不得外達必成不治之證醫見舌苔白多疑伏寒未敢徑用清涼因循貽誤者有之不知舌苔白乃暑邪傷氣肺主氣屬金金色白故也絞腸痧夏間有不頭痛發熱但覺小腹疼痛或心腹俱痛鼓脹痞滿不能屈伸者人或疑為陰證或執為食生冷過多不知皆暑火流注臟腑不能解故先小腹痛後及遍心腹法宜六和湯清解之或五苓散加香薷木瓜紫蘇半夏之類利散之自愈若以為陰病生冷而用熱藥熱物助之不可救已或用炒鹽和滾水服探吐痰涎亦妙亦有發熱身痛等證內兼心腹痛大概吐法為上用藿香正氣散或二陳湯加厚朴炒梔佳霖按痧脹為寒熱錯雜之病其因甚繁絞腸特其一證耳金匱所謂陰毒陽毒者是也其試痧之法脈與證相反者痧也嚼黃豆無豆腥氣嚼帶毛生芋子而不麻口者痧也辨痧之法先吐瀉而心腹絞痛者多由穢氣而發先心腹絞痛而吐瀉者多由暑氣而發心胸昏悶痰涎膠結者多從伏熱而發遍身腫脹疼痛四肢不舉舌強不言者多因寒氣冰伏火毒而發治痧之法病在孫絡者表也先宜在病者背心輕輕向下刮之病在絡脈者里也先宜於十手足指甲處舌下兩旁兩臂彎及委中等穴刺之以泄其毒然後審證制方王養吾痧書郭右陶玉衡言之最詳豈六和五苓正氣二陳便能蕆事哉仲景於金匱未便定方只以一升麻鱉甲湯加減示人途徑其意深矣然痧脹之治難定而痧脹之原不可不知又按內經言營氣取營運於中之義西醫謂食入於胃至小腸皆有微絲管吸其精液上至頸會管過肺入心左房化赤為血此即清者為營也其血從左房入總脈管由脊之膂筋循行經脈間一日夜五十周盡八百十丈之脈道以應呼吸漏下者之營氣也經言衛氣取衛護於外之義西醫謂經脈中之血氣由脈管之尾出諸氣街入微絲血管經謂孫絡者是也與陽明之悍氣人之飲食五味雜投奚能無毒西醫謂之炭氣者是也相合散布通體皮腠之間充膚熱肉淡滲毫毛此即濁者歸衛也脈管之赤血既入微絲血管合陽明悍氣則其色漸變漸紫西醫因其有毒謂之炭氣散布遍體漸並漸粗入回血管經謂絡脈者是也之尾血入回血管內而臟腑外而經脈並脈管交相逆順而行外行經脈者有陰陽之別一支浮於肌腠之上一支沉於分肉之間即陽絡行於皮表陰絡行於皮里而皆與脈管偕行經言營在脈中衛在脈外者是也回血管內外行遍入總回管至心右房遞入於肺呼出悍氣吸入生氣其血復化為赤入心左房經言陰陽相貫如環無端者此之謂也痧脹為寒暑錯雜之毒邪由皮毛而入者與陽明悍氣合阻遏纏布周身孫絡中之血氣由口鼻吸受者阻遏絡脈中之血氣暑毒郁遏悍氣愈遏其毒愈烈故一發燎原苟不急治則毒由回血管入心入心則死矣急治之法藥餌功緩故宜刮宜刺急泄其毒邪不令入心徐圖解救否則不明致痧之原妄使湯藥幾同操刃時疫見朱丹溪春應暖反寒夏應熱反涼秋應涼反熱冬應寒反溫此非其時而有其氣是以一歲之中長幼之病多相似者為時行溫疫病也治法用人參敗毒散九味羌活湯夏加滑石石膏冬加麻黃桂枝春秋止依原方或藿香正氣散五積散防風通聖散亦可甚者黃連解毒湯竹葉石膏湯霖按疫者猶徭役之謂大則一郡一城小則一村一鎮比戶傳染多見於大凶之後蓋旱潦兵火之餘烈日鬱蒸尸骸之氣與亢勝之氣混合化為沴厲之毒散漫於天地之間沿門闔境最易沾染若不傳染便非溫疫乃四時常氣之溫熱證耳越人所謂異乎寒熱之溫病其脈行在諸經不知何經之動也各隨其經之所在而取之緣古無瘟字溫即瘟疫之謂也夫溫疫為天地沴厲之氣不可以常理測即不可以常法治方書溫瘟不分治法多誤良可慨矣先哲治疫有上焦如霧升逐解毒中焦如漚疏逐解毒下焦如瀆決逐解毒之論深得治疫要領故吳又可溫疫論治熱濕相搏之疫首用達原飲繼則三消承氣以決逐之陳錫三二分晰義楊栗山寒溫條辨中亦以升降散升決並用為首方若余師愚疫疹一得之清溫敗毒飲乃專治熱淫所勝之溫疫故一意清熱而不兼驅濕也更有爛喉丹沙傳變甚速亦不外乎疏達清散清化下奪救液諸法陳耕道疫沙草論之最詳近又出熱疫白喉一證其治法載諸張紹修白喉捷要此兩證亦互相傳染皆溫疫之流亞也龐安常傷寒總病論所載青筋牽赤脈㩌黃肉隨白氣貍黑骨溫諸疫是本於素問遺編之五行五疫也近人約為六證所謂大頭瘟蛤蟆瘟瓜瓤瘟疙瘩瘟軟腳瘟絞腸瘟是也斯皆疫之兼於溫者其病層出不窮其方亦難備載豈人參敗毒九味羌活兩方加減便可概治非常理所能測之溫疫哉寒疫一夏月亦有病涼者偶遇暴風怒雨不及加衣或夜失覆或路行冒犯皆能為涼證此非其時而有其氣謂之寒疫治法與暑症異亦以九味羌活湯敗毒散以辛散和解為主不可專用汗藥此論乃李東垣先生髮自十書中從來醫書罕及然僅百之一耳以一律百以或然為固然左矣霖按寒疫多病於金水不斂之年人氣應之以其毛竅開而寒氣閉之也疫乃天地不正淫泆厲氣頗難驟逐非風寒之邪一汗可解治法宜蘇桂杏草等溫散更察其兼濕兼風消息治之東坡在黃州以聖散子治疫甚效亦寒疫挾濕之方也後永嘉宣和間服此方殞命者不知凡幾蓋以寒疫之方誤施於溫疫者也脈理脈訣舉要曰暑傷於氣所以脈虛弦細芤遲體狀無餘劉覆真曰暑脈虛而微弱按之無力又脈來隱伏弦細芤遲皆暑脈也脈虛身熱得之傷暑中暍脈虛而微者是也寒病傳經故脈日變溫熱不傳經故脈不變寒病浮洪有力者易治芤細無力者難治無脈者不治若溫熱則不然溫有一二部無脈者暑熱有三四部無脈者被火所逼勒而藏伏耳非絶無也於病無妨攻之亦易醫人一診驚走不知照經用辛寒藥火散而脈起脈起而病愈徒駭何益乎要在辨之詳耳蓋溫熱病有中一二經始終止在此一二經更不傳遞別經者其一二經或洪數則別經弱且伏依經絡調之則洪者平伏者起乃愈徵也昔在萬曆丁未三月間豫寓京師備員太倉庫差忽一日吏部同鄉劉蒲亭馳報曰病劇求救豫就其寓吏部同僚諸公環守之已備後事譫語抹衣不寐者七八日已御醫院吳思泉名醫也偕醫數人治之豫診脈止關脈洪大其餘皆伏乃書方竹葉石膏湯諸公皆驚曰吳等已煎附子理中湯何冰炭如是豫詰之曰吳雲陽證陰脈故用附子豫曰兩關洪大此陽脈也其餘經為火所伏非陰脈也吳厲聲相爭豫亦動色自任諸公從之一劑晡時即止譫語抹衣就寐片時豫視其脈已洪者平而伏者起諸公相視曰此真張仲景也又用辛涼藥調理痊愈脈症有相合者易知有相左者難知脈明而後可以辨證證真而後可以施藥要在虛心細察不可執己見而以百藥嘗試令命在反掌間也慎之慎之霖按溫暑之脈多有伏者然總不全伏若診一二部未伏之脈必洪數雖不洪數細按之定必有力初病尤當於血氣中以辨寒熱素問陰陽應象大論曰左右者陰陽之道路也水火者陰陽之徵兆也此論血氣陰陽之升降以藏氣言肝木左升肺金右降以脈體言左屬血右屬氣凡診感證之脈傷寒多盛於左部寒傷形傷其有形之營血也溫暑多盛於右部熱傷氣傷其無形之衛氣也此水火之徵兆血氣之左右不可不察若濕甚熱微者又不可泥此又按夫血氣陰陽錯宗互用其理淵微言之不盡自東垣辨感論強分左為人迎右為氣口以人迎脈大於氣口屬外感氣口脈大於人迎屬內傷然此所云外感者指外感風寒而言云內傷者指內傷飲食而言蓋寒傷形血故脈盛左部食傷胃府故脈盛右關後世醫家誤會其意竟謂凡病外感皆當左盛凡病內傷皆當右盛血氣不分陰陽莫辨雖有王安道論之於前吳又可論之於後奈積習難反寒熱倒施能不遺人夭扎鮮矣若夫傷寒傳入陽明右關脈實大者燥矢填於胃府宜議下溫暑陷入陰經左關尺數大者肝腎之伏熱與外熱相搏多不治活法在人不可拘執左大風寒右大溫暑也然而初病風寒浮緊必盛於左部初病溫暑洪數必盛於右部此又不可不察也五運六氣運氣症治者所以參天地陰陽之理明五行衰旺之機考氣候之寒溫察民病之凶吉推加臨補瀉之法施寒熱溫涼之劑古人云治時病不知運氣如涉海問津諴哉言也今遵先賢圖訣撮其要領使人一覽而知其悉也矣五運配十干之年甲己得合為土運乙庚得合為金運丁壬得合為木運丙辛得合為水運戊癸得合為火運六氣為司天之歲子午少陰君火丑未太陰濕上寅申少陽相火卯酉陽明燥金辰戍太陽寒水巳亥厥陰風木南政北政甲己土運為南政蓋土居中央君尊南面行餘四運以臣事之面北而受令所以有別也十二支年分運氣子午年少陰君火司天歲氣熱化之候司天者天之氣候也君火者手少陰心經也心者君主之官神明出焉君火乃主宰陽氣之本余象生土乃發生萬物之源陽明燥金在泉在泉者地之氣候也初之氣厥陰風木用事子上父下益辛瀉苦自年前十二月大寒節起至二月驚蟄終止天時寒風切冽霜雪水冰蟄蟲伏藏民病關節禁固腰腿疼中外瘡瘍二之氣少陰君火用事火盛金衰補肺瀉心自二月春分節起至四月立夏終止天時風雨時寒雨生羽蟲民病淋氣鬱於上而熱令人目赤三之氣少陽相火用事君相二火瀉苦益辛自四月小滿節起至六月小暑終止天時大火行熱氣生羽蟲不鳴燕百舌杜宇之類民病厥熱心痛寒更作咳喘目赤四之氣太陰濕土用事子母相順瀉肺補腎自六月大暑節起至八月白露終止天時大雨時行寒熱互作民病黃瘟衄血咽乾嘔吐痰飲五之氣陽明燥金用事心盛肺衰火怕水復自八月秋分節起至十月立冬終止天時溫氣乃至初冬尤暖萬物向榮民病寒熱伏邪於春為瘧六之氣太陽寒水用事火衰心病瀉咸益苦自十月小雪節起至十二月小寒終止天時暴寒徑切火邪恣毒寒氣暴止民病生腫咳嗽甚則血溢下連小腹而作寒中丑未年太陰濕土司天歲氣濕化之候太陰濕土者足太陰脾經也脾屬中央戊己土每季寄王一十八日合為七十二日以應一歲六六三百六十日之成數也太陽寒水在泉初之氣厥陰風木用事主旺客衰瀉酸補甘自年前十二月大寒節起至二月驚蟄終止天時大風發榮雨生毛蟲民病血溢經絡拘強關節不利身重筋痛二之氣少陰君火用事以下生上瀉甘補咸自二月春分節起至四月立夏終止天時大火至疫癘君命宜行濕蒸相搏暴雨時降民病瘟疫盛行遠近咸若三之氣少陽相火用事土旺剋水補腎瀉脾自四月小滿節起至六月小暑終止天時雷雨電雹地氣騰濕氣民病身重跗腫胸腹滿感冒濕氣四之氣太陰濕土用事甘旺咸衰補腎益膀胱自六月大暑節起至八月白露終止天時炎熱沸騰地氣升濕化不流民病腠理熱血暴溢寒瘧心腹脹浮腫五之氣陽明燥金用事土能生金益肝瀉脾自八月秋分節起至十月立冬終止天時大涼霧露降民病脾胃寒瘧痢甚行六之氣太陽寒水用事以上克下瀉脾補腎自十月小雪節起至十二月小寒終止天時大寒凝冽民病關節禁固腰腿拘痛寅申年少陽相火司天歲氣火化之候少陽相火者三焦浮流之火火邪則炎上上克肺金金受克腎水失母則上盛下虛虛陽上攻變生諸疾至傷元氣厥陰風木在泉初之氣厥陰風木用事子父相逢瀉苦益辛自年前十二月大寒節起至二月驚蟄終止天時熱氣傷人時氣流行民病寒熱交作咳逆頭痛血氣不調心腹不快二之氣少陰君火用事肺衰心盛制苦益辛自二月春分節起至四月立夏終止天時暴風疾雨溫濕相蒸民病上熱咳逆胸膈不利頭痛寒熱三之氣少陽相火用事夏旺火識補益大腸自四月小滿節起至六月小暑終止天時炎暑亢旱草萎河輸民病煩熱赤目喉閉失血熱渴風邪人多暴死四之氣太陰濕土用事火能生土瀉甘補咸自六月大暑節起至八月白露終止天時風雨時降炎暑未去民病瘧痢交作寒熱頭疼五之氣陽明燥金用事肺金受邪瀉苦補辛自八月秋分節起至十月立冬終止天時寒熱風雨草木黃落民病邪寒風熱君子周密六之氣太陽寒水用事心火受克瀉咸補苦自十月小雪節起至十二月小寒終止天時寒溫無時地氣正寒霜露乃降民病感冒寒邪關節不利心腹痛卯酉年陽明燥金司天歲氣燥化之候陽明燥金者肺與大腸之氣象庚辛金也少陰君火在泉初之氣厥陰風木用事金木相剋補酸瀉辛自年前十二月大寒節起至二月驚蟄終止天時陰始凝風始肅水乃冰寒雨多花開遲民病寒熱浮腫失血嘔吐小便赤淋二之氣少陰君火用事火盛金衰瀉辛益酸自二月春分節起至四月立夏終止天時臣居君位大熱早行民病疫癘流行人多卒暴三之氣少陽相火用事主盛客衰瀉心補肺自四月小滿節起至六月小暑終止天時燥熱交合風雨暴至民病寒熱頭疼心煩作渴四之氣太陰濕土用事以下生上瀉辛益酸自六月大暑節起至八月白露終止天時早秋寒雨有傷苗稼民病卒暴寒熱風邪傷人心疼浮腫瘡瘍失血五之氣陽明燥金用事金盛木衰瀉肺補肝自八月秋分節起至十月立冬終止天時冬行春令草木生青風雨生蟲民病寒熱作痢氣血不和六之氣太陽寒水用事客來助主益苦瀉咸自十月小雪節起至十二月小寒終止天時氣候反溫蟄蟲出現民病疫癘溫毒寒熱伏邪辰戌年太陽寒水司天歲氣寒化之候太陽寒水者足膀胱經也與足少陰腎經合為表裡屬北方壬癸水太陰濕土在泉初之氣厥陰風木用事脾胃受邪瀉咸助甘自年前十二月大寒節起至二月驚蟄終止天時氣早暖草早榮溫風至民病瘟疫寒熱頭痛嘔吐瘡瘍二之氣少陰君火用事心火受邪瀉酸補甘自二月春分節起至四月立夏終止天時春寒多雨寒濕無時民病氣鬱中病浮腫寒熱三之氣少陽相火用事以上克下瀉咸助苦自四月小滿節起至六月小暑終止天時暴熱乍涼疾風暴雨民病寒熱吐痢心煩悶亂癰疽瘡瘍四之氣太陰濕土用事木旺土衰瀉甘補酸自六月大暑節起至八月白露終止天時風濕交爭雨生羽蟲暴風疾雨民病大熱短氣赤白痢瀉五之氣陽明燥金用事金生水旺制咸益苦自八月秋分節起至十月立冬終止天時濕熱而行客主令民病氣虛客熱血熱妄行肺氣壅盛六之氣太陽寒水用事水盛水衰瀉酸助苦自十月小雪節起至十二月小寒終止天時凝寒雨雪地氣正濕令行民病病乃悽慘孕婦多災脾受濕肺旺肝衰巳亥年厥陰風木司天歲氣風化之候厥陰風木者足厥陰肝經也肝屬東方甲乙木春旺七十二日也少陽相火在泉初之氣厥陰風木用事脾胃受邪瀉酸補甘自年前十二月大寒節起至二月驚蟄終止天時寒始肅客行主令殺氣方至民病寒居右脅氣滯脾胃虛壅二之氣少陰君火用事火旺金衰瀉心補肺自二月春分節起至四月立夏終止天時寒不去霜雪冰殺氣施木草焦寒雨至民病熱中氣血不升降三之氣少陽相火用事肺經受邪瀉苦益辛自四月小滿節起至六月小暑終止天時風熱大作雨生羽蟲民病淚出耳鳴掉眩四之氣太陰濕土用事木土相刑瀉酸益甘自六月大暑節起至八月白露終止天時熱氣返用山澤浮雲暴雨溽濕民病心受邪黃疸面為浮腫五之氣陽明燥金用事以金刑木瀉肺益肝自八月秋分節起至十月立冬終止天時燥濕更朦沉陰乃布風雨乃行民病寒氣及體肺受風脾受濕發為瘧六之氣太陽寒水用事主助客勝瀉酸補甘自十月小雪節起至十二月小寒終止天時畏火司令陽乃化火蟄蟲出現流水不冰地氣大發草乃生民病瘟疫心腎相制按天上地下而人居其中一氣布分三才並立人與天地呼吸相通升降相符故陰陽寒暑之氣內外合一若魚與水然故運氣所感即人之疾疴應之善攝生者能調和臟腑使血氣順軌天時不能侵不則逐氣而化疫癘扎瘥不可勝瘳至於因證而思治癘不能幹人可以勝天是在乎司命留意焉霖按運氣之學白首難窮本不必過泥然此篇言六氣而不言五運且有主氣而無客氣何以明勝復亢制之理設徑執某年某氣應患何病必用何藥則誤人非淺轉不若繆希雍之不言為善茲將客氣主運客運録於下聊備詳查不足知運氣之奧也增訂客氣客運活法客氣者乃地之陰陽正化對化加臨主氣六位之客氣也夫天干起運地支起氣如子午年少陰君火司天陽明燥金在泉氣由下而升上即以在下之陽明起之陽明燥金金生水客之初氣為太陽寒水水生木二氣為厥陰風木木生火三氣為少陰君火火生土四氣為太陰濕土三陰極生一陽為震即少陽相火故少陽相火為客之五氣太陰濕土土生金陽明燥金為客之六氣余仿此推故丑未年客之初氣厥陰風木二氣少陰君火三氣太陰濕土四氣少陽相火五氣陽明燥金六氣太陽寒水寅申年客之初氣少陰君火二氣太陰濕土三氣少陽相火四氣陽明燥金五氣太陽寒水六氣厥陰風木也卯西年客之初氣太陰濕土二氣少陽相火三氣陽明燥金四氣太陽寒水五氣厥陰風木六氣少陰君火辰戍年客之初氣少陽相火二氣陽明燥金三氣太陽寒水四氣厥陰風木五氣少陰君火六氣太陰濕土巳亥年客之初氣陽明燥金二氣太陽寒水三氣厥陰風木四氣少陰君火五氣太陰濕土六氣少陽相火也主運者每歲不移之主運也以木為初運在年前大寒後交木生火以火為二運在春分後交火生土以土為三運在芒種後交土生金以金為四運在處暑後交金生水以水為五運在立冬後交每運各主七十三日五刻有奇此歲歲之常也客運者十干合化之運也甲己之年為土運乙庚之年為金運丙辛之年為水運丁壬之年為木運戊癸之年為火運此每歲加臨之中運每歲以中運起運如甲己之年土運統之即土為初運土生金金為二運金生水水為三運水生木木為四運木生火火為五運乙庚之年初金運二水運三木運四火運五土運丙辛之年初水運二木運三火運四土運五金運丁壬之年初木運二火運三土運四金運五水運戊癸之年初火運二土運三金運四水運五木運此歲歲變遷之客運也但乙丁己辛癸屬陰乾為五陰年主不及之運甲丙戊庚壬屬陽干為五陽年主太過之運此陰不及陽太過之例也所載主氣客氣主運客運者皆四時之常不足候天地之變沈存中曰寒暑風雨水旱螟蝗率皆有法而人之衆疾亦隨氣運盛衰其術多不驗何歟蓋膠於定法而不知所用故也假令厥陰用事其氣多風民病濕泄豈普天之下皆多風普天之民皆病濕泄耶至於一邑之間而暘雨有不同者此氣運安在欲無不謬不可得也大凡物理有常即有變運氣所主者常也異乎所主者皆變也常則如本氣變則無所不至而各有所占故其候有從逆淫郁勝復太過不及之變其發皆不同若厥陰用事多風而草木榮茂是之謂從天氣明潔燥而無風此之謂逆太虛埃昏流水不冰此之謂淫大風折木雲物濁擾此之謂郁山澤焦枯草木凋落此之謂勝大暑燔燎螟蝗為災此之謂復山崩地震埃昏時作此謂之太過陰森無時重云晝昏此之謂不及隨其所變疾厲應之皆視當時當處之候雖數里之間但氣候不同而所應全異豈可膠於一定熙寧中京師久旱祈禱備至連日重陰人謂必雨一日驟晴炎日赫然豫時因事入對上問雨期豫對曰雨候已見期在明日衆以謂頻日晦溽尚且不雨如此暘燥豈復有望次日果大雨是時濕土用事連日陰者從氣已效但為厥陰所勝未能成雨後日驟晴者燥金入候厥陰當折則太陰得伸明日運氣皆順以是知其必雨此亦當處所占也若他處候別所占亦異其造微之妙間不容髮推此而求自臻至理夫沈氏為以主客皆常而以當時當處所見者為客深得軒岐活法若邵辨占候補遺十五條尤嫌緣刻未能盡運氣之變也故不録其太過不及淫郁從逆勝復之應仍當於內經中求之
