body:
  text: 卷中古今名醫暑證匯論張機字仲景東漢南陽人舉孝廉官至長沙太守作傷寒論醫方大備扁鵲倉公無以加焉後世稱為醫聖孫思邈唐景兆華原人幼稱聖童隋文帝召不拜太宗即位召見拜諫議大夫固辭隱太白山學道養氣得度世之術洞曉天文精究醫業著千金方三十卷朱肱號無求子宋吳興人深於傷寒著活人書道君朝詣闕投進授奉議郎醫學博士其中論暑一二款見節庵內不另載劉完素字守真金河間人少聰敏博學忽遇異人以酒飲之大醉及寤洞達醫術撰運氣要旨論精要宣明論素問玄機原病式然好用涼劑以降心火益腎水為主自號通玄處士張元素字潔古金易州人八歲試童子舉二十七歲試經義進士犯廟諱下第乃學醫洞徹其術其學則李東垣深得之其論不另載李杲字明之號東垣元之鎮人也幼好學博經史尤樂醫藥捐千金從張元素盡傳其業當時稱為醫聖東垣十書多其著述朱震亨字彥修學者尊之曰丹溪先生元末婺之義烏人也自幼好學日記千言從許文懿公得朱子四傳之學因母病即慨然曰士苟精一藝以推及物之仁雖不仕於時猶仕也乃棄舉業一於醫致力褒然稱醫大成焉方廣字約之號古庵休寧人讀儒之暇留意醫經為名醫善用丹溪法王綸字汝言號節齊浙江慈溪人官至廣東布政因父病精醫著明醫雜著發丹溪所未發世甚尊信之陶華字尚文號節庵餘杭名醫幼讀儒書旁通百氏著傷寒瑣言發仲景所未發大行於世正統間被徵引疾歸時論高之虞摶字天民號恆德老人正德花溪人著醫學正傳醫學權輿醫學集成岐黃之宗匠也李梴字文清江右南豐人生儒家習詩禮之訓惓惓有志於澤物遂博古今方論著醫學入門雖時業乎而精詳可追花溪王肯堂字宇泰號損庵金壇人中萬曆己丑進士授翰林檢討制舉義鑿核傳誦海內尤以歧黃顯所著有證治準繩證治類方諸書大行於世慧識燭照精心縷析力追古人焉按自古以方術名世者多不能遍列姑即其切於治暑者録其論並方因録其姓氏使後之業岐黃者誦其書以考其世奮然有仰止之思焉安知不與古長桑伯元諸公兢駕而馳聲乎張仲景傷寒例第三論濕暍第四論辨太陽病脈第五論傷寒例第三論曰脈盛身寒得之傷寒脈虛身熱得之傷暑霖按此乃王叔和序例中語不得拉雜謂是仲景之論脈盛傷寒是矣然必盛於左部脈虛身熱傷暑是矣虛大之脈必盛於右部且傷寒未有不發熱者此序例言其略例耳不可泥也痓濕暍第四論曰太陽中熱者暍是也其人汗出惡寒身熱而渴也又曰太陽中暍者發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚按此證一味涼藥清內火辛以散之酸以收之三者為妙汗下俱不可若加之溫針則速其斃耳霖按仲景治暍三法鼎峙前已釋明注言此證一味涼藥清內火辛以散之酸以收之三者為妙恐未盡然身重而疼痛其脈弦細芤遲濕勝也豈寒涼酸收所能治哉疏矣辨太陽病脈第五論曰傷寒二三日陽明少陽證不見者為不傳也霖按此節正仲景示人以傳經之活法也天有寒暑燥濕風火之六氣人之臟腑有三陽三陰之六氣天之寒熱感於人人即以己身之寒氣應之所謂同氣相得也靈樞本藏篇云三焦膀胱者腠理毫毛其應是太陽寒水主皮毛為膚表之第一層故風寒首傷太陽然亦有不從太陽而竟至於陽明少陽以及於三陰者蓋三陽三陰所主之部位何經虛何經即受邪也如病形篇云中於面則下於陽明中於項則下太陽中於頰則下少陽其中於膺背兩脅亦中其經又曰中於陰者常從胻臂始是也至於素問熱論所謂傳經之法一日太陽二日陽明三日少陽四日太陰五日少陰六日厥陰者乃人身之六氣以次相傳此氣傳非病傳但人身何經何氣之虛其病邪亦即由此而入所謂邪之所湊其氣必虛也仲景恐治傷寒者泥於按日傳經故曰傷寒二三日陽明少陽證不見者為不傳也是二日陽明如傳當見身熱目疼鼻乾不得臥三日少陽當見胸脅痛而耳聾若不見陽明少陽經病證則不傳也三陰亦然是傳經不可拘執按日見何經病證即以何經法治之至若言足不言手者省文也須知陰陽有互根之義寒邪首傷足太陽熱邪必首傷手太陰此互根之理不可移易者也後世言傷寒按日傳經固屬大謬而謂溫暑只在三焦而不傳他經者亦非果否則一日太陽二日陽明傳經之說何以見諸熱論乎夫傷寒有直中三陰者溫熱伏氣有發於少陰出諸少陽者暑邪中人有入心入肝入脾之辨是皆不可膠柱者也又曰太陽病發熱而渴不惡寒者為溫病按溫病無專經隨其所中以脈辨之亦有不中太陽初不頭痛惡寒諸證而庸醫認為痰火內傷禍不旋踵矣此證不傳經止中一二經慎之慎之霖按溫病乃冬至陽生人身所伏之陽熱被嚴寒折伏藏於肌骨之間至春郁遏之陽熱為外邪逗引始得發泄伏陽既出肌膚遇春令之氣暄熱兩熱相干而成溫病即素問生氣通天論所謂冬傷於寒春必病溫者是也其外感之邪輕故不惡寒只發熱而渴亦有微惡寒旋即熱渴者外邪較重也若口黏苔膩身痛便溏有汗不解脈濡數者非中風乃溫病挾濕也溫邪內發其脈多盛於右部熱傷氣也風熱之邪外受先傷手太陰經風寒之邪則先傷足太陽經蓋肺主表膀胱亦主表也治傷寒之麻黃湯非瀉肺藥乎言太陽病則手太陰亦包括於中省文也溫熱當察三焦論治其傳經見何經證以何經法治之傷寒亦然惟用藥寒熱之不同耳或言溫熱不傳經只重三焦則熱論何以又有一日太陽二日陽明傳經之文此不待辨亦明矣謂溫病無專經此越人五十八難指疫證而言不得拉雜冬日伏氣之溫熱病也又曰若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲若火熏之一逆尚引日再逆促命期按此證皆春溫以內有火熱感以風寒故一發劇也眠睡語難皆火內灼非風溫外甚也自汗風傷衛不惡寒外證輕也止宜辛涼藥內解微發表則愈霖按風溫為內蘊伏熱外感風邪其惡風怯寒為或有之證而熱渴咳嗽為必有之證也發汗已身灼熱者是誤以辛溫發表風藥多燥觸引伏氣風火相煽致有自汗身重多睡鼻鼾語難出諸候斯皆誤汗劫液後之變證非風溫初病固有之證也若再誤下誤火則直視失溲驚惕瘛瘲一逆尚引日再逆促命期矣此明初既誤表繼又誤下誤火釀成不可救藥足徵風溫為燥熱之病泄熱和陰為斯證一定治法縱或稍挾表邪只宜蔥豉蒡薄等味辛涼輕劑啓腎氣疏風熱是矣豈可妄施麻桂哉孫思邈傷寒例論傷寒例論曰易稱天地變化各正性命然則變化之跡無方性命之功難測故有炎涼寒燠風雨晦冥水旱妖災蟲蝗怪異四時八節種種施化不同七十二候日月運行各別終其晷度得成年是謂歲功畢矣天地尚且如此然在人安可無事故人生天地之間命有遭際時有否泰吉凶悔吝苦樂安危喜怒愛憎存亡憂畏關心之慮日有千條謀身之道時生萬計乃度一日是故天無一歲不寒暑人無一日不憂喜故有天行溫疫病者即天地變化之一氣也斯蓋造化必然之理不得無之故聖人雖有補天之極之德而不能廢之雖不能廢之而能以道御之其次有賢人善於攝生能知撙節與時推移亦得保全天地有斯瘴癘還以天地所生之物以防備之命曰知方則病無所侵矣然此病也俗人謂之橫病多不解治皆曰日滿自差以此致枉者天下太半凡始覺不佳即須救療迄至於病愈湯食兢進折其毒勢自然而差必不可令病氣自在恣意攻人拱手待命斯為誤矣按真人此論從天人合基處發脈義理源頭上起瀾而議論蒼古渾渾灝灝真與南華並傳雖論寒哉而溫與暑之祕皆兼之矣敬録置之座右以為玄宗之一助醫道待其餘耳劉河間中暑論中暑之證身熱頭痛背寒面垢自汗煩燥大渴口乾倦怠而身不痛或時惡寒或畏日氣脈虛而弱無問表裡通宜白虎湯並感冒發熱煩渴五苓散桂枝茯苓甘露飲黃連香薷飲或雙解散或裡熱甚腹滿而脈沉可下者大承氣湯下之或三一承氣湯尤妙半表半裡者小柴胡湯涼膈散天水散按劉河間論暑證甚詳獨明於諸家用藥頭頭中款可謂得其解者但暑證不分表裡一味清內得寒涼而解苦酸而收不必用下承氣湯走馬之糞也卻之卻之李東垣暑傷胃氣論刺志論云氣虛身熱得之傷暑熱傷氣故也痿論云有所遠行勞倦逢大熱而渴則陽氣內伐則熱舍於腎腎者水臟也今水不能勝火則骨枯而髓虛足不任身發為骨痿故下經曰骨痿者生於大熱也此濕熱成痿令人骨乏無力故治痿獨取陽明時當長夏濕熱大勝蒸蒸而熾人感之多四肢困倦精神短少懶於動作腦氣促肢節沉痛或氣高而喘身熱而煩心下膨痞小便黃而少大便溏而頻或痢出黃糜或如泔色或渴或不渴不思飲食自汗體重或汗少者血先病而氣不病也自時當長夏至此已採入正款不敢擺刖故重出其脈中得洪緩若濕氣相搏必加以遲病雖互換少差其天暑濕令則一也宜以清燥之劑治之名曰清暑益氣湯主之清暑益氣湯黃耆汗少者減五分蒼朮泔浸去皮各一錢五分升麻一錢人參去蘆白朮橘皮神麯炒澤瀉各五分甘草黃柏酒浸當歸身麥門冬去心青皮去白葛根各三分五味九個內經云陽氣者衛外而為固也炅則氣泄今暑邪干衛故身熱自汗以黃耆人參甘草補中益氣為君橘皮當歸身甘辛微溫養胃氣和血脈為臣蒼朮白朮澤瀉滲利除濕升麻葛根苦甘平善解肌熱又以風勝濕也濕勝則濕不消而作痞滿故炒曲甘辛青皮辛溫消食快氣腎惡燥急食辛以潤之以黃柏苦辛寒借甘味瀉熱補水虛者滋其化源以五味子麥門冬酸甘微寒救天暑之傷庚金為佐也上㕮咀作一服水二盞煎至一盞去粗稍熱食遠服按東垣意見精密立方中和清暑益氣湯一劑近世多宗之然氣血虛弱之人用之最宜如遇強壯者不能取效且助溫火不可不斟酌也朱丹溪中暑論中暑論曰暑乃夏月炎暑也盛熱之氣著人也有冒有傷有中三者有輕重之分虛實之辨或腹痛水瀉者胃與大腸受之噁心者胃口有痰飲也此二者冒暑也可用黃連香薷飲清暑益氣湯蓋黃連退暑熱香薷消畜水或身熱頭疼躁亂不寧者或身如針刺者此為熱傷在肉分也當以解毒湯白虎湯加柴胡如氣虛者加人參此為傷暑或咳嗽發寒熱盜汗出不止脈數者熱在肺經用清肺湯柴胡湯天水散之類急治則可遲則不救盛火乘金也此為中暑凡治病須要明白辨別慎勿混同施治春秋間亦或有之切莫執一隨病處方為妙按暑病原有輕重分傷冒中三款是已但凡感暑而病者皆從冒火而得總謂之傷暑其感火多而熱重者乃為中暑以內外諸雜證分屬五臟猶為近理至以五臟分屬冒傷中三者則誤矣其內外諸雜證即有重輕均從臟腑而發若以分屬之三證豈不泥且左矣名家亦有此誤又何以破後人之迷也辨動得靜得丹溪曰若暑之時無病之人或避暑熱納涼於深堂大廈涼臺冷館大扇風車得之者是靜而得之陰證也其病必頭痛惡寒身形拘急肢節疼痛而心煩肌膚大熱無汗此為陰寒所遏使周身陽氣不得伸越宜用辛溫之劑以解表散寒用厚朴紫蘇乾葛藿香羌活蒼朮之類若外既受寒內復傷冰水生冷瓜果之類前藥再加乾薑縮砂神麯之類此皆非治暑也治因暑而致之病也按靜動而得分中暑傷暑此論出自張潔古後皆因之天盛暑之時炎火若炙無之非是故古人聞避暑而未聞避寒深堂廣廈正以避暑安得入而中之且房室陰涼正可護衛陽氣又安得而遏傷之乎即膏粱深處必不能無冒暑應接其傷暑者亦於動中得之耳老子曰人能常清靜天地盡皆歸一靜即可祛暑從何而中也至於冰水瓜果等寒物多食自傷脾胃亦生雜證謂瀉痢雜證內有此物積聚則可謂專以此致暑病則不可若執口得寒物身犯寒氣同冬時寒病治之則謬以千里矣霖按潔古論暴以動靜分陰陽甚屬不經致啓後人訾議然亦出諸不得已也何以言之夫暑字從日云暑而不云火其義可思蓋天日之陽熱蒸地氣以上騰人在氣交中感之者為病暑素問五運行大論謂暑以蒸之禮記月令謂土潤溽暑者是也夏至陰生人身所伏者陰氣暑在六氣屬之君火在臟屬心在卦屬離且離火中虛則暑為陽熱中含陰象可徵是以仲景治暍三法鼎峙潔古猶恐世醫不明其義故設陰暑陽暑之名以辨治丹溪引伸潔古之意故曰此非治暑也治因暑天所致之病也何等曉暢初不料遺譏於後世也夫潔古所謂動而得之為陽暑者是言藜藿之人或奔走長途或戮力田間暴中天日之熱為陽暑乃動中之動也所謂靜而得之為陰暑者是言膏粱之人廣廈風車恣欲無度致損真陽陰濕內伏寒熱外襲為陰暑乃靜中之動也若果清靜無為真氣內守百邪亦不能侵豈獨一暑病哉方古庵附余暑論論曰寒則傷形熱則傷氣何以言之人與天地同一橐籥夏月天之氣浮於地表則人之氣浮於肌表況被盛暑所傷膚腠疏豁氣液為汗發泄於外是表裡之氣俱虛矣不善攝生者暑熱傷於外生冷戕於中若之何而能運化也是以水穀停積而為濕熱發為嘔吐為泄瀉甚則吐瀉俱作而揮霍悶亂也若不即病濕熱怫鬱於內他日為瘧為痢之所由矣今大順散非治暑熱之藥乃治暑月飲涼過多為病之劑也歟按此論精當但大順散不可輕用王節齊附余暑論論曰夏至日後病熱為暑暑者相火行令也夏月人感之自口齒而入傷心包絡之經其脈虛或浮大而散或弦細芤遲蓋熱傷氣則氣消而脈虛弱其為證汗煩則喘渴靜則多言身熱而煩心痛大渴引飲頭疼自汗倦怠少氣或下血發黃生斑甚者火熱制金不能平木搐搦不省人事治暑之法清心利小便最好暑傷氣宜補真氣為要又有惡寒或四肢逆冷甚者迷悶不省而為霍亂吐利痰滯嘔逆腹痛瀉痢此則非暑傷人乃因暑而自致之病也以其因暑而得故亦謂之暑病然治法不同也按節齊此論氣脈證方俱備種種精妙暑月可録一通於座右古庵節齊以世代不宜列此因原系丹溪附余姑附之霖按節齊此論似是而非夫天之六氣風寒暑濕燥火應地之五行則木水火土金火君火以明相火以位暑為君火在卦為離離中虛乃明兩作之義故曰暑中多挾濕也暑先入心應乎君火包絡主手厥陰相火其氣與心相通其脈與心相連心病每治包絡者以心為君主之宮藏義不受邪也不得舍君火而言相火是六氣尚不能明豈可録之座右哉陶節庵辨張仲景傷寒論辨張仲景傷寒論曰傷寒者乃冬時感寒即病之名桂枝麻黃二湯為當時之傷寒設與過時之溫暑者有何預焉夫受病之原則同亦可均謂之傷寒所發之時既異治之則不可混也請略陳之夫春溫夏熱秋涼冬寒者四時之正氣也以成生長收藏之用風亦因四時之氣而成溫涼寒熱也若氣候嚴寒風亦凜冽天道和煦風亦溫暖冬時坎水用事天令閉藏水冰地凍風於寒相因而成殺厲之氣人觸冒之腠理鬱塞乃有惡風惡寒之證其餘時月則無此證也仲景固知傷寒乃冬時殺厲之氣所成非比他病可緩故其為言特詳於此書而略於雜病倘能因名以求其實則思過半矣不幸此書傳世久遠遺帙頗多晉太醫令王叔和得散亡之餘詮次流傳其功博矣惜乎以己論混經未免穿鑿附會陳無已氏因之順文注釋並無缺疑正誤之言以致將冬時傷寒之方通解溫暑遺禍至今而未已也溫暑必別有方今皆失而無徵也我朝宋景濂學士嘗嘆傷寒論非全書得其旨哉蓋傷寒之初中人必先入表表者何即足太陽寒水之經此經行身之後自頭貫脊乃有頭疼脊強惡寒之證在他經則無此證矣況此經乃一身之綱維為諸陽之主氣猶四通八達之衢治之一差其變有不可勝言者矣故宜此二湯發散表中寒邪經曰辛甘發散為陽者是也若以此湯通治春溫夏熱之病則誤之甚矣按麻黃桂枝湯原為冬月傷寒正藥溫暑二病不可混施節庵力破從來之迷至於辨仲景書中多遺帙缺誤歸罪於王叔和之詮次陳無已之注釋可謂發前人所未發但仲景醫書專明傷寒故詳於寒病略於溫暑原不為溫暑設也治傷寒用藥大略論曰四時皆有傷寒治之不可一概論也冬時氣寒腠理微密非辛甘溫不可故以桂枝等湯以治之然風與寒常相因寒傷榮惡寒頭痛脈浮緊而無汗則用麻黃湯開發腠理以散邪得汗即愈風則傷衛頭痛惡風脈浮緩而自汗則用桂枝湯克塞腠理以散邪汗止即愈經云辛甘發散為陽者是也若夫榮衛俱傷又非此二湯所能治也須大青龍湯然此湯太峻又非庸俗所可擬也豫亦有代之者蓋冬時為正傷寒天氣嚴凝風寒猛烈觸冒之者必宜用辛溫散之其非冬時亦有惡寒頭疼之證皆宜辛涼之劑通表裡和之則愈矣若以冬時所用桂枝辛溫之藥通治之則殺人多矣曰辛涼者何羌活沖和湯是也兼能代大青龍為至穩嗚呼一方可代三方危險之藥按辨寒溫暑藥甚明沖和一湯尤為溫涼二證穿楊之劑百發百中者也傷寒變溫熱病論曰活人書發於溫病曰陽熱未盛為寒所制豈有伏寒既已變而為溫尚可言寒能制其陽熱耶又於熱病曰陽熱已盛寒不能制亦不當復言其為寒也蓋是春夏陽熱已變其伏寒即非有寒能制其陽熱耳外有寒邪能折陽氣者乃是時行寒疾仲景所謂春分以後秋分節前天有暴寒為時行寒疫是也三月四月其時陽氣尚弱為寒所折病熱則輕五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦微是知時行寒疾與溫熱二病所論陽氣盛衰時月則同至於論暴寒之寒與伏寒已變之寒自是相違名不正則言不順矣張仲景又云其病與溫及暑病相似但治有殊耳要在辨其病源寒熱溫三者之殊則用藥之冷熱判然矣按南陽發變字大有慧心至於伏寒之誤南翁亦灼然知其然而不敢明攻其非恐起襲聞者議耳乃亦為非時寒疾以破其惑始自東垣設寒疫一款皆可羽翼內經啓蒙萬世也溫病辨難經曰溫病之脈行在諸經不知何經之動隨其經之所在而取之如太陽證頭疼惡寒汗下後過經不愈診得尺寸俱浮者太陽病溫也過時而發不在表也已經汗下亦不在表也經曰不惡寒而反渴者溫病也明其熱自內達外無表證明矣按傷寒傳經由腑入臟由陽入陰溫病不傳經止中一二經或乘某經火或乘某經虛被春時寒氣所中自內發外而作寒熱等證或中腑則腑病或中臟則臟病不論日期始終惟此一二經內經言惟經所動隨經而取自是明明斷案節庵分經良是而以過太陽經不傳別經定為溫病此辨別寒溫之口訣所當佩服者辨惡寒論曰惡寒否乎曰傷寒自冬月風寒而成外則有惡寒惡風之證既名為溫則無此證矣曰然則子之言何所據乎曰據乎經耳經曰太陽病發熱不惡寒而渴者溫病也不惡寒則病非因外來渴則明其自內達表按冬月傷寒由於外感而惡寒是矣曰溫證不惡寒非也蓋溫證緣陽氣發暢為春時風寒所迫雖系內熱亦由外感故亦有惡寒等證豈獨溫即暑病亦有此證蓋暑屬外火傷於臟腑內外炎炎故熱極戰栗而成惡寒醫不知遂為傷寒不可不詳辨也辨溫暑涼寒諸證論曰傷暑與傷寒俱有熱若誤作傷寒治之則不可蓋寒傷形熱傷氣傷寒則外感寒而脈浮緊傷暑則不惡寒而脈虛此為異耳經云脈盛身寒得之傷寒脈虛身熱得之傷暑治宜小柴胡湯渴加石膏知母或人參白虎湯天久淫雨濕令大行蒼朮白虎湯若元氣素弱而傷之重者清暑益氣湯治之夫傷寒二字蓋冬時天氣嚴寒以水冰地凍而成殺厲之氣人觸犯之即時病者為傷寒乃有惡寒頭疼發熱之證故用麻黃桂枝發散表中寒邪自然熱退身涼有何變證如或頭疼惡寒表證皆除而反見譫語怕熱燥渴大便閉者以法下之大便通而熱愈有何怪證其餘春夏秋三時雖有惡寒身熱頭疼亦微即為感冒非時暴寒之輕非比冬時氣正傷寒為重也如冬感寒不即病伏藏於肌膚至春夏秋時其伏寒各隨時氣改變為溫為熱者因溫暑將發又受暴寒故春變為溫病既變之後不得復言其為寒矣所以仲景有云發熱不惡寒而渴者其理可見溫病也暑病亦然比之溫病尤加熱不惡寒則病非外來渴則明其熱自內達表無表證明矣治溫暑大抵不宜發汗過時而發不在表也其伏寒至夏又感冒寒變為暑病暑病者即熱病也取夏火當權而言暑字緣其溫熱二證從冬時伏寒所化總曰傷寒所發之時既異治之不可混也若言四時俱是正傷寒者非也此三者皆用辛涼之劑以解之若將冬時正傷寒之藥通治之定殺人矣辛涼羌活沖和湯是也兼能代大青龍湯治傷寒見風傷風見寒為至穩一方可代三方危險之藥如垣夷其神乎哉世俗皆所未知也若表解其里證具者亦以法下之無惑又傷寒下後過經不愈者亦溫病也已經汗下亦不在表也隨病制宜凡有辛苦勞役之人有患頭疼惡寒身熱加之骨腿痠疼微渴自汗脈雖浮大而無力此為勞力感寒用補中益氣辛溫之劑為良經云溫能除大熱正此謂也若當和解者即以小柴胡加減和之下證見者即以本方加大黃微利之切勿過用猛烈其害非細若初病無身熱無頭疼便就怕寒厥冷腹痛嘔吐泄瀉脈來沉遲無力此為直中寒證宜溫之而不宜汗下也疫癘者皆時行不正之氣老幼傳染相同者是也緣人不近穢氣免傷真氣若近穢氣有傷正氣故病相傳染正如牆壁固賊人不敢入正氣盛邪氣不敢侵正氣既虛邪得乘機而入與前溫暑治又不同表證見者人參敗毒散半表半裡證者小柴胡里證具者大柴胡下之無以脈診以平為期與其瘧痢等證亦時疫也照常法例治之按此辨傷寒傷暑最為吃緊廣度慈航一披卷而瞭然者當熟讀精思方得其解斟酌用之方得其妙辨風溫論曰風溫尺寸俱浮素傷於風因而傷熱風與熱搏即為風溫其外證四肢不收身熱自汗頭疼喘息發渴昏睡或體重不仁慎勿發汗汗之則譫語煩躁目無精彩病在少陰厥陰二經葳蕤湯人參敗毒散小柴胡湯選用按溫病外證四肢不收等惡證乃溫病之極重者輕則為溫重則為風溫乃病名也朱南陽曾道及之若謂素傷於風因而傷熱風與熱搏即為風溫者非確論也謂不可發汗乃調溫之訣霖按陶氏極力辨論溫暑而於陰陽伏氣懵然不知且將難經所載沴厲雜氣之溫病古無瘟字溫即瘟也拉雜是瘟溫不分無怪乎執柴葛解肌人參敗毒數方貽誤後學也虞花溪醫學正傳論暑內經曰因於暑汗煩則喘喝靜則多言潔古又曰靜而得之為中暑動而得之為中熱中暑者陰證中熱者陽證仲景傷寒論中一證曰中暍即暑也脈虛而微弱煩渴引飲體熱自汗此蓋得勞役體虛而暑邪干衛之候是宜東垣清暑益氣湯等補益之劑治之而愈一證曰熱病即中熱也脈洪而緊盛頭疼身熱口燥心煩此蓋得之於冬感寒邪鬱積至夏而發而挾暑而成大熱之候是宜黃連白虎解毒等湯清涼之劑調之而愈曰中暑者陰症內傷之為病也曰中熱者恐亦外感之為病也曰陰曰陽豈不於斯而明辨之乎學者宜再思之按暑熱一氣也感暑而病熱原不可分為二氣中與傷有輕重之別丹溪有冒中傷三名細思總為傷暑其極重者則稱中耳冒不必言也已有專辨傷寒證分有陰陽暑證屬火多發揚激烈之狀總謂之陽似無所為陰者惟其感深日久驟發而沉昏不省人事閉目息微此類似陰其實火極氣結痰盛氣閉臟腑不通咽喉嗌塞使然乃陽勝非陰也陰證陽證尚不可分況以暑與熱分之益不達矣霖按此闢花溪以暑熱分陰陽是矣而謂暑為火極之證與熱不分然則以六和湯為治暑主方火熱之證果宜厚朴砂仁藿香半夏諸燥熱之品乎自相矛盾亦不思甚矣總因不明陰陽互根之義故開口便錯近世王孟英泥執暑為火邪而不兼濕亦由不讀內經剿襲一家之說率爾操觚也李文清醫學入門論暑暑病身熱自汗口渴面垢而已餘證皆後傳變或兼內傷必先問其人素虛胃弱或大病大勞後縱暑中傷者宜清暑益氣素強盛壯實無虛損病者宜祛暑和中自襲暑氣而言曰中暑自被日逼而言曰中暍然暑初入自口鼻牙頰達於心主胞絡以火從火故古法治暑取冷水灌溉勿咽即暑暍證但以手足搐搦為風手足逆冷為厥厥與傷寒熱厥義同黃連香薷飲暑風乃勞役內動五臟之火與外火交熾則金衰木旺生風香薷飲加羌活六和湯合消風散素有痰飲因暑觸動痰熱生風者六和湯合星香散救痰壅法暑毒痰火窒塞胸中量體虛實吐之火鬱發之之義也如痰喘氣急痞寒入藥不得者急煎六和湯調麝二釐服救絞腸痧法並乾霍亂絞腸痧腹痛不可忍或連心痛展轉在地手足亦冷乃腸絞縮在腹須臾能死用熱湯調鹽一兩灌入即安或再用陳艾陳樟木陳壁土各等分水煎連進三四服救途中熱倒法若道途卒倒湯藥不便恐氣脫難治急扶陰涼處不可臥濕冷地掬道上熱土放臍上撥開作竅令人尿與其中待求生薑或蒜嚼以熱湯或童便送下外用布蘸按入門一書雖系時出中間亦頗詳細故録其數條以備覽暑暍一氣也若中暑中暍之分則強矣王宇泰證治準繩論暑論曰此事難知傷暑有二動而傷暑心火大盛肺氣全虧故身脈洪大動而火勝者熱傷氣也辛苦人多得之白虎加人參湯靜而傷暑火勝金位肺氣出表故惡寒脈沉疾靜而濕勝者身重也安樂之人多受之白虎加蒼朮湯傷暑必自汗背寒面垢或口熱煩悶或頭疼發熱亦有身痛者更有痛甚身如骨碎者神思倦怠殊甚暑傷氣而不傷形故也但身體不痛與感風寒異宜香薷飲六和湯嘔而渴者浸冷香薷湯或五苓散兼吞消暑丸嘔不止者枇杷葉散去茅根吞來復丹嘔而痰卻暑散吞消暑丸或小半夏茯苓湯或消暑飲又有不瀉而腹干痛者六和湯煎熟調蘇合香丸暑先入心者心屬南方離火各從其類小腸為心之府利心經暑毒使由小腸中出五苓散利小便治暑上劑也暑月身癢如針刺間有赤腫處亦名暑風末子六和湯和消風散酒調服暑風而加以吐瀉交作者六和湯藿香正氣散各半貼加全蠍三個有暑毒客於上焦胸膈痞塞湯藥至口即出不能過關或上氣喘急六和湯浸冷調入麝香少許暑氣久而不解遂成伏暑內外俱熱煩躁自汗大渴喜冷宜香薷飲加黃連一錢繼進白虎湯若服藥不愈者暑毒深入結熱在裡譫語煩湯不欲近衣大便祕結小便赤澀當用調胃承氣湯或三黃石膏湯按承氣湯必不可轉用加減清暑益氣湯復立變證加減法於後如心火乘脾乃血受火邪而不升發陽氣伏於地中地者人之脾也必用當歸和血少用黃柏以益真陰如脾胃不足之證須少用升麻乃足陽明太陰引經之藥也使行陽道自脾胃中左遷少陽行春令生萬物之根蒂也更加柴胡使諸經右遷生髮陰陽之氣以滋春之和氣也如脾虛緣心火亢盛而乘其土也其次肺氣受邪為熱所傷必須黃耆最多甘草次之人參又次之三者皆甘溫之陽藥也脾始虛肺氣先絶故用黃耆之甘溫以益皮毛之氣而閉腠理不令自汗而損元氣也上喘氣短懶言語須用人參以補之心火乘脾須用炙甘草以瀉火熱而補脾胃中元氣甘草最少恐滋滿也若脾胃之急痛並脾胃大虛腹中急縮腹皮急縮者卻宜多用經曰急者緩之若從權必加升麻以引之恐左遷之邪堅盛卒不肯退反致項上及臀尻肉添而行陰道故引之以行陽道使清氣出地右遷而上行以和陰陽之氣也若中滿者去甘草咳甚者去人參口乾嗌乾者加甘葛如脾胃既虛不能升浮為陰火傷其生髮之氣榮血大虧榮氣伏於地中陰火熾盛日漸煎熬血氣虧少且心包絡與心主血血減則心無所養致使心亂而煩病名曰悗悗者心惑而煩悶不安也是由清氣不升濁氣不降清濁相干亂於胸中使周身血氣逆行而亂經云從下上者引而去之故當加辛溫甘溫之劑生陽陽生而陰長也故曰甘溫何能生血又非血藥也曰仲景之法血虛以人參補之陽旺則能生陰血也更加當歸和血又宜少加黃柏以救腎水蓋甘寒瀉熱火火減則心氣得平而安也如煩亂猶不能止少加黃連以去之蓋將補腎水使腎水旺而心火自降扶持地中陽氣也如氣浮心亂則以硃砂安神丸鎮固之得煩減勿再服以防瀉陽氣之反陷也如心下痞亦少加黃連氣亂於胸為清濁相干故以陳皮理之能助陽氣之升而散滯氣又助諸甘辛為用故長夏濕土客邪火旺可從權加蒼朮白朮澤瀉上下分消其濕熱之氣濕氣大盛主食不消化故食減不知穀味加炒曲以消之便加五味子麥門冬人參瀉火益肺氣助秋損也此三伏中長夏正旺之時藥也按此證治準繩中論暑證者至精緻密立中含和王道之宗匠不能具載謹摘其要者録於下至加減清暑益氣湯尤東垣之知己名醫類案增補名醫類案羅謙甫治蒙古百戶因食酒肉飲潼乳得霍亂吐瀉證從朝至午精神昏憒已困急來告羅視之脈皆浮數按之無力所傷之物已出矣即以新汲水半碗調桂苓白朮散徐服之稍得安靜又於牆陰掘地約二寸貯以新水在內攪動待一時澄定用清者一杯再調服之漸漸氣調吐瀉遂止至夜安臥翌日微煩渴遂煎錢氏白朮散時時服良愈或曰用地漿者何也坤屬地地屬陰土平曰靜煩感至陰之氣又於牆陰貯新汲水以收重陰之氣也陰中之陰能瀉陽中之陽陽霍亂因暑熱內傷所得故用地漿之意也提舉父年近八十六月中暑毒霍亂吐瀉昏冒終日不省人事時夜參半請羅視之脈七八至洪大有力頭熱如火足冷如冰半身不遂牙關緊急蓋年高氣弱當暑氣極盛陽明得令之際為陰得而動之中暑明矣非甘辛大寒之劑不能瀉其暑熱墜浮溜之火安神明也遂以甘露散甘辛大寒瀉熱補氣加茯苓以分陰陽約一兩水調灌之漸漸省事諸證悉去慎言語節飲食三日以參朮補中湯以意增減旋服理正氣愈十日平復滑伯仁治一人病自汗如雨面赤身熱口燥心煩當盛暑帷幕周密自以虛亡陽服朮附數劑脈虛而洪數舌上苔黃伯仁曰前藥誤矣熱病熱治醫者死之素問云必先歲氣毋伐天和朮附豈可輕用以犯時令又云脈虛身熱得之傷暑暑家本多汗加剛劑脈洪數而汗甚乃令撤幔開窗少頃漸覺清爽以黃連人參白虎湯三進而汗止大半諸證亦減兼以既濟湯渴用冰水調天水散二日而愈孫兆治一人自汗兩足冷至膝下腹滿不省事孫診六脈小弱而急問其所服藥取視皆陰病藥也孫曰此非受病重藥能重病耳遂用五苓散白虎湯十餘貼病少蘇再服全愈或問治法孫曰病人傷暑也始則陽微厥而脈小無力醫謂陰病遂誤藥其病厥用五苓散利小便則腹消白虎湯解利邪熱則病愈凡陰證脛冷則臂亦冷汝今脛冷臂不冷則下厥上行是如陽之微厥也此證乃先傷濕後傷暑為濕之證也丹溪治一人夏大發熱譫語肢體莫舉喜冷飲脈洪大而數以黃耆茯苓濃煎如膏用涼水調服三四次後昏臥如死氣息如常次日方醒而愈一人夏發大熱大汗惡寒戰栗不自禁持且煩渴此暑病也脈虛微細弱而數其人好賭致功而虛以人參竹葉作湯調辰砂四苓散數劑而安項彥章治一人病甚醫皆以為瘵盡愕束手項診之脈細數而且實細數者暑也暑傷氣宜虛今不虛而反實乃熱傷血藥為之也家問死期曰何得死為作白虎湯飲即瘥吳茭山治一婦人冬月偶感患灑灑惡寒翕翕發熱惡食乾嘔大便欲去不去諸醫皆以虛弱痰飲治之以二陳補心等藥服不效延及半月吳診其脈虛而無力類乎傷暑衆不然之究問其病因其婦曰因天寒換著綿衣取綿套一床蓋之須臾煩渴寒熱嘔吐綿延至今耳吳曰誠哉傷暑也蓋綿套曬之盛暑夾熱收入笥中必有暑氣尚未開泄今人體虛得之易入故病如是其婦曰然遂制黃連香薷飲連進二服而愈逢年歲熱甚凡道路城市昏作而死者此皆虛人勞人或飢飽失節或素有病一為暑氣所中不得泄即關竅皆窒非暑氣使然氣閉塞而死也古方治暑無他但用辛甘發散疏導心氣與水流行則無害矣崇寧乙酉吳為書局時一馬伕馳馬出局下忽仆地絶急以五苓大順散灌之皆不驗已逾時同舍王相使取大蒜一握道上熱土雜研爛以新水和之濾去渣決其齒灌之少頃即蘇至暮此僕為吳御馬而歸乃知藥病相對有如此者此方本徐州沛縣門忽有板書釘其上或傳神仙救人者沈存中王聖美皆著其說而吳親驗之出石林老人避暑録汪希說治一壯男子形色蒼黑暑月客遊舟回患嘔噦顛倒不得眠粒米不入六日矣脈沉細虛豁諸醫雜投藿香柴苓等藥不效危殆汪曰此中暑也進人參白虎湯人參五錢服下嘔噦即止鼾睡五鼓方醒索粥連進二三服乃減參稍輕調理數劑而愈霖按治暑之案甚多此於千百中只有其一附選數則以補其不足許叔微治一人頭痛身熱心煩燥渴診其脈大而虛授以白虎湯數服愈仲景云脈虛身熱得之傷暑又云其脈弦細芤遲何也素問曰寒傷形熱傷氣蓋傷氣不傷形則氣消而脈虛弱所謂弦細芤遲者皆虛脈也仲景以弦為陰朱龐亦云中暑脈微細則虛可知霖按白虎湯數服愈者其脈大而虛也若弦細芤遲則中含濡象暑傷氣而中挾濕故也非白虎湯所宜亦不可泥執補氣全作虛治也凡醫案鬚髮明其脈證之所以然方可為後學程法惟許學士其庶幾乎萬密齊治縣丞李天泉六月中暑腹痛渠有婢妾醫謂病寒進理中湯一劑痛止乃發熱一身骨節盡痛又進十神湯發汗熱退身不痛矣萬候之李稱病愈觀其面色帶赤知病未解請脈之洪滑而數色脈相對經曰大則病進今汗後脈猶洪數病方進也而彼自稱愈萬去食頃而病作矣滿腹急痛狀如奔豚上下左右舉手按摩亟延萬至曰汝先診脈不言而去知我病也幸急救我萬曰無傷乃進建中湯一服而痛定次日有省祭官萬朴來問疾朴善醫診之且駭且顧李亦疑懼萬診之謂朴曰汝怪其脈之促止乎蓋心下怔忡故脈如是耳李即應曰我心下跳亂不寧即命取藥方用人參麥冬甘草白芍生地五味獖豬心煮湯煎一服心跳止脈不促矣蓋心惡熱用熱治熱向服理中十神俱犯禁故病復作也霖按面赤脈洪數色脈相參自是暑病方進以建中定痛然矣但暑先入心傷其營血況以理中十神用熱治熱者乎萬以尚未清理暑熱故見脈數歇止則知其熱傷心營虛而跳止也西士言由肺入心之血從心入脈管以榮養臟腑經脈皮毛血由心左房落脈管一次則脈跳一次西醫聽心血之聲知脈有病變而營衛循行之道六氣標本之理莫不由此悟入總在細心體察耳粗工視人命同草菅烏足與言此江應宿治其嶽母年六十餘六月中旬勞倦中暑身熱如火口渴飲冷頭痛如破脈虛豁二三至一止投人參白虎湯三貼渴止熱退惟頭痛用白蘿蔔汁吹入鼻中良愈孫子華赴試南都六月初旬夢遺畏寒驚懼重裘厚被取汗過多身熱六脈滑數無力與清暑益氣湯次日舌強語言不清如癲目瞪不識人江曰此為暑風與人參白虎湯加膽星殭蠶秦艽天麻竹瀝薑汁漸愈數日後舌心黑如墨與黃連解毒湯涼膈散不退與犀角地黃湯而愈一人瘦長而脆暑月過勞飢飲燒酒遂身熱汗出昏懵語亂江視之脈皆浮小而緩按之虛豁曰暑傷心勞傷脾也蓋心藏神脾藏意二臟俱傷宜有是證法宜清暑益脾用八物湯加麥冬山梔陳皮十餘貼而愈霖按江公三案平正可法其第二案解毒涼膈不應易犀角地黃湯始愈同一涼藥有對與不對之別讀者最宜深思張路玉治金魯公觸熱勞形醉飽不謹後受涼遂發熱頭痛脹滿喘逆大汗如蒸面赤戴陽足冷陽縮脈弦數無力曰此傷暑夾食而復夾陰也與大順散一服不應轉脹急不安因與枳實理中加厚朴大黃是夜更衣二次身涼足暖而痊霖按此案於不謹後受涼而見面赤陽縮足冷汗多且喘最易作陰證其辨在發熱頭痛脹滿與陰證不合更察其不謹之前有醉飽之病因故大順散不應即用枳實理中加厚朴大黃得更衣而愈若誤以白通四逆殆矣此暑天變證非暑證也要亦不可不知汪石山治一人年三十八餘形瘦弱忽病上吐下瀉水漿不入口七日自分死矣診脈八至而數曰當夏而得是脈暑邪深入也吐瀉不納水穀邪氣自盛也遂以人參白虎湯進半杯良久復進一杯覺稍安三服後減去石膏知母而人參漸次加至四五錢黃柏橘皮麥冬等隨其所兼之病而佐使一月後平復霖按此暑熱霍亂之輕者吐瀉至七八日而不死亦由未服溫補燥熱之劑故耳汪公制劑固當而進退操縱有法暑盛氣傷之治此案可師一人病霍亂欲吐不吐欲瀉不瀉心腹㽲痛脈之沉伏如無此乾霍亂也急令鹽湯探吐宿食痰涎碗許遂瀉與六和湯愈霖按痛脈多伏以鹽湯探吐乃開其上竅上竅開則下竅自通而得吐瀉即可治矣孫文垣治程氏子先醉酒後入房次早四肢冷胃腕痛極脈僅四至或以鬱火治投以寒涼痛更甚三日前所食西瓜吐出未化乃翁以為陰證傷寒欲用附子理中湯不決逆孫視之面色青慘叫痛而聲不揚坐臥煩亂是霍亂兼蛔厥證也先當止痛安蛔後理霍亂可免死也遲則誤事矣急用醋炒五靈脂三錢蒼朮一錢五分烏梅三個川椒炮薑桂心各五分水煎飲下痛減大半下午以大腹皮藿香半夏橘皮山楂茯苓五靈脂兩貼全安霖按此人以縱欲貪涼恣食生冷致病而又誤設寒涼之劑故以溫胃安蛔和中化滯而效其霍亂亦不甚重張石頑云一少年新婚陡然腹痛麻瞀或令飲火酒半杯腹痛轉劇旋增顱脹身發紅點與蘆根汁得吐痛解復有鼻衄口燥胸腹略見紅斑啜童子小便稍安又濃煎蔥豉湯仍入童便續續與之得大吐汗出而痊霖按此證即夏日之暑沙伏毒得酒愈熾先以蘆根汁清熱解毒以殺其勢繼進蔥豉湯倍用童便解穢清營仍從宣達分消而愈治法穩當懷抱奇治一男子恣飲梅水吐瀉無度手足厥逆面色慘晦聲音不出而脈沉伏小水點滴不通服藥入口即吐醫告技窮懷思梅味酸主收故小便癃閉而果得麝則敗麝又香竄走竅乃取麝半入臍中半入鼻孔病者即以手拂其鼻曰此何物也少頃小水大下二三行忽如醉而醒夢而覺越日索粥漸安霖按此亦暑厥而無外因者以敗果通竅即能奏效然其巧思正不可及童栻廬治陳氏婦盛夏病霍亂吐瀉腹中㽲痛四肢厥冷冷汗溱溱轉筋戴眼煩躁大渴喜冷飲飲已即吐六脈皆伏雖曰霍亂實臟厥也經云大氣入臟腹痛下注可以致死不可以致生速宜救陽為急遲則腎陽絶矣以四逆湯薑附各三錢炙甘草吳茱萸各一錢木瓜四錢煎成冷服日夜連進三劑四肢始和危象皆退口渴反喜沸湯寒象始露即於方中佐以生津存液之品兩服而安霖按肢冷脈伏大渴喜冷飲此霍亂屬乎熱者但喜冷飲而飲已即吐服熱藥後反喜沸湯此真寒假熱證也故宜四逆湯然而小溲必清白吐出瀉出必無穢濁氣味方是真寒的候否則真假莫辨殺人事矣倪姓患霍亂吐瀉審知始不作渴四肢不逆脈不沉細一醫用大順散兩帖漸至於此因見四逆復加附子脈證更劇童曰此病一誤再誤命將殆矣若果屬寒投熱病已今反四逆脈轉沉細欲伏乃釀成熱深厥深與熱邪傳入厥陰者何異即以竹葉石膏湯人參易西洋參加黃連滑石兩劑而安同時有陸姓患此醫用回陽之劑日夜兼進厥逆煩躁日增病人欲得冷水禁絶不與甚至病者自起拾地上痰涎以解渴遷延旬日而死噫即使真屬陰寒陽回躁渴如是熱藥之性鬱而無主以涼藥和之病亦立起不學無術曷勝浩嘆霖按此非真熱霍亂然其證甚輕醫者藥誤致釀熱深厥深竹葉石膏湯人參易西洋參極是即使寒證回陽後躁渴亦當參以涼潤和之此千古不刊之論也
